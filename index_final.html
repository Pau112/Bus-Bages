const dow = new Date().getDay();
let currentDay = dow === 0 ? 'diumenge' : dow === 6 ? 'dissabte' : 'feiner';
let myVotes = {}, sharing = {};

function toMins(t) {
  if (!t) return -1;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function nowMins() {
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}

function setDay(d) {
  currentDay = d;
  const banner = document.getElementById('day-banner');
  const typeEl = document.getElementById('day-type-text');
  const descEl = document.getElementById('day-desc-text');
  banner.className = 'day-banner';
  ['btn-f','btn-s','btn-d'].forEach(id => document.getElementById(id).className = 'ds-btn');
  if (d === 'feiner') {
    banner.classList.add('feiner');
    typeEl.textContent = 'Dia feiner';
    descEl.textContent = 'Servei complet · dilluns a divendres (excepte agost)';
    document.getElementById('btn-f').classList.add('active-f');
  } else if (d === 'dissabte') {
    banner.classList.add('dissabte');
    typeEl.textContent = 'Dissabte i festiu';
    descEl.textContent = 'Servei reduït de cap de setmana i dies festius';
    document.getElementById('btn-s').classList.add('active-s');
  } else {
    banner.classList.add('festiu');
    typeEl.textContent = 'Diumenge';
    descEl.textContent = 'Servei de diumenge (excepte festius)';
    document.getElementById('btn-d').classList.add('active-d');
  }
  doSearch();
}

function loadVotes() {
  // Escoltar vots - pero SENSE cridar doSearch() si el canvi ve de nosaltres mateixos
  // (per evitar el parpadeig i la perdua de clics)
  db.collection("votes").onSnapshot({ includeMetadataChanges: false }, snapshot => {
    let changed = false;
    snapshot.docChanges().forEach(change => {
      const v = change.doc.data();
      const key = v.tripId + '_' + v.type;
      if (change.type === 'removed') {
        delete globalVotes[key];
        changed = true;
      } else {
        // Nomes actualitzem si el valor es diferent (pot ser un vot d'un altre usuari)
        if (globalVotes[key] !== v.value) {
          globalVotes[key] = v.value;
          changed = true;
        }
      }
    });
    // Nomes re-renderitzem si hi ha canvis reals (d'altres usuaris)
    if (changed) doSearch();
  });

  // Escoltar ubicacions en temps real
  db.collection("locations").onSnapshot(snapshot => {
    snapshot.forEach(doc => {
      const d = doc.data();
      if (Date.now() - d.time < 2 * 60 * 60 * 1000) {
        userLocations[d.tripId] = { lat: d.lat, lng: d.lng, hora: d.hora };
      } else {
        delete userLocations[d.tripId];
      }
    });
    doSearch();
  });
}

function doSearch() {
  const orig = document.getElementById('sel-orig').value;
  const dest = document.getElementById('sel-dest').value;
  if (orig === dest) {
    document.getElementById('results').innerHTML = '<div class="no-results">Selecciona parades diferents.</div>';
    return;
  }
  const trips = (T[currentDay] || [])
    .filter(t => t.times[orig] && t.times[dest])
    .sort((a, b) => toMins(a.times[orig]) - toMins(b.times[orig]));

  const now = nowMins();
  let passed = null, nextList = [];
  for (const t of trips) {
    if (toMins(t.times[orig]) <= now) passed = t;
    else nextList.push(t);
  }

  let html = '';
  if (passed) {
    html += '<p class="section-label">Bus anterior</p>';
    html += renderCard(passed, orig, dest, 'passed');
  }
  if (nextList.length > 0) {
    html += '<p class="section-label">Proper bus</p>';
    html += renderCard(nextList[0], orig, dest, 'next');
    if (nextList.length > 1) {
      html += '<p class="section-label">Següents busos</p>';
      for (let i = 1; i < Math.min(nextList.length, 5); i++)
        html += renderCard(nextList[i], orig, dest, '');
    }
  }
  if (!passed && !nextList.length)
    html = '<div class="no-results">No hi ha busos per a aquesta ruta avui.</div>';

  document.getElementById('results').innerHTML = html;
}

function renderCard(trip, orig, dest, type) {
  const dep = trip.times[orig];
  const arr = trip.times[dest];
  const isPassed = type === 'passed';
  const isNext = type === 'next';
  const myO = globalVotes[trip.id + '_occ'] || myVotes[trip.id + '_occ'];
  const myT = globalVotes[trip.id + '_time'] || myVotes[trip.id + '_time'];

  const occ = myO;
  let occBadge = occ === 'ple' ? `<span class="badge br">Ple</span>`
    : occ === 'mig' ? `<span class="badge ba">Mig ple</span>`
    : occ === 'buit' ? `<span class="badge bg">Buit</span>`
    : isPassed ? `<span class="badge bx">Sense vots</span>` : '';

  let timeBadge = myT === 'tard' ? `<span class="badge ba">Retard</span>`
    : myT === 'punt' ? `<span class="badge bg">Puntual</span>` : '';

  const shareConfirm = sharing[trip.id]
    ? `<div class="share-confirm">Ubicació compartida a les ${new Date().getHours()}:${String(new Date().getMinutes()).padStart(2,'0')} · gràcies!</div>`
    : '';

  const voteSection = !isPassed ? `
    <div class="vote-section">
      <div>
        <div class="vote-label">Ocupació</div>
        <div class="vote-row">
          <div class="vm ${myO==='buit'?'ag':''}" onclick="cv('${trip.id}','occ','buit')">Buit</div>
          <div class="vm ${myO==='mig'?'aa':''}" onclick="cv('${trip.id}','occ','mig')">Mig</div>
          <div class="vm ${myO==='ple'?'ar':''}" onclick="cv('${trip.id}','occ','ple')">Ple</div>
        </div>
      </div>
      <div>
        <div class="vote-label">Puntualitat</div>
        <div class="vote-row">
          <div class="vm ${myT==='punt'?'ag':''}" onclick="cv('${trip.id}','time','punt')">Puntual</div>
          <div class="vm ${myT==='tard'?'aa':''}" onclick="cv('${trip.id}','time','tard')">Tard</div>
        </div>
      </div>
    </div>
    <button class="share-btn ${sharing[trip.id]?'on':''}" onclick="ts('${trip.id}')" ${sharing[trip.id]?'disabled':''}>
      ${sharing[trip.id]?'Ubicació enviada':'Estic en aquest bus · comparteix ubicació'}
    </button>

    ${userLocations[trip.id] ? `
  <div style="margin-top:10px;">
    <iframe
      width="100%"
      height="180"
      style="border-radius:10px;border:0;"
      loading="lazy"
      src="https://www.openstreetmap.org/export/embed.html?bbox=${
        userLocations[trip.id].lng - 0.01
      }%2C${
        userLocations[trip.id].lat - 0.01
      }%2C${
        userLocations[trip.id].lng + 0.01
      }%2C${
        userLocations[trip.id].lat + 0.01
      }&marker=${
        userLocations[trip.id].lat
      }%2C${
        userLocations[trip.id].lng
      }">
    </iframe>
  </div>
` : ''}

    ${shareConfirm}` : '';

  return `<div class="bus-card${isNext?' isnext':isPassed?' passed':''}">
    ${isNext ? '<div class="tag-next">Proper bus</div>' : ''}
    <div class="card-top">
      <div>
        <div class="card-time">${dep}</div>
        <div class="card-sub">Arr. ${arr} · ${trip.line}</div>
      </div>
      <div class="badges">${occBadge}${timeBadge}</div>
    </div>
    ${voteSection}
  </div>`;
}

function cv(id, type, val) {
  const docId = id + '_' + type;

  // 1. Actualitzem localment de forma IMMEDIATA - el boto es veu aix mateix
  globalVotes[docId] = val;
  doSearch();

  // 2. Guardem a Firebase en segon pla (sense bloquejar la UI)
  db.collection("votes").doc(docId).set({
    tripId: id,
    type: type,
    value: val,
    time: Date.now()
  }).catch(() => {
    // Si falla, revertim
    delete globalVotes[docId];
    doSearch();
  });
}
function ts(id) {
  if (!navigator.geolocation) {
    alert("El teu navegador no suporta geolocalitzacio.");
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const hora = new Date().getHours() + ':' + String(new Date().getMinutes()).padStart(2,'0');

      // Actualitzem localment de forma immediata
      sharing[id] = true;
      userLocations[id] = { lat, lng, hora };
      doSearch();

      // Guardem a Firebase per que els altres ho vegin
      db.collection("locations").doc(id).set({
        tripId: id,
        lat: lat,
        lng: lng,
        hora: hora,
        time: Date.now()
      });
    },
    () => {
      alert("No s'ha pogut obtenir la ubicacio. Dona permisos de localitzacio.");
    }
  );
}

loadVotes();
setDay(currentDay);
</script>
