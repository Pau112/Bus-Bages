<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bus Bages</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0d0d0d; display: flex; justify-content: center; padding: 20px 0; min-height: 100vh; }
    .app { width: 100%; max-width: 390px; background: #0d0d0d; min-height: 100vh; }

    .header { background: #1a1a1a; padding: 14px 16px 10px; border: 0.5px solid #2a2a2a; border-radius: 14px; margin: 10px 12px 0; }
    .header h1 { font-size: 26px; font-weight: 700; color: #f0f0f0; }
    .header-sub { font-size: 15px; color: #888; margin-top: 4px; }

    .day-banner { margin: 10px 12px 0; border-radius: 10px; padding: 7px 10px; display: flex; align-items: center; gap: 8px; }
    .day-banner.feiner { background: #1a2e1a; border: 0.5px solid #3B6D11; }
    .day-banner.festiu { background: #1a2233; border: 0.5px solid #185FA5; }
    .day-banner.dissabte { background: #2a2010; border: 0.5px solid #854F0B; }
    .day-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
    .feiner .day-icon { background: #2d5a1b; }
    .festiu .day-icon { background: #1a3a5c; }
    .dissabte .day-icon { background: #5c3a0a; }
    .day-info { flex: 1; }
    .day-type { font-size: 12px; font-weight: 600; }
    .feiner .day-type { color: #7bc857; }
    .festiu .day-type { color: #5fa8e8; }
    .dissabte .day-type { color: #e8a84f; }
    .day-desc { font-size: 11px; margin-top: 1px; }
    .feiner .day-desc { color: #5a8c2a; }
    .festiu .day-desc { color: #4a7abf; }
    .dissabte .day-desc { color: #9a6515; }

    .day-switch { display: flex; gap: 4px; margin: 8px 12px 0; }
    .ds-btn { flex: 1; padding: 5px 4px; border: 0.5px solid #2a2a2a; border-radius: 20px; font-size: 11px; text-align: center; cursor: pointer; background: #1a1a1a; color: #666; }
    .ds-btn.active-f { background: #1a2e1a; color: #7bc857; border-color: #3B6D11; font-weight: 600; border-radius: 20px; }
    .ds-btn.active-s { background: #2a2010; color: #e8a84f; border-color: #854F0B; font-weight: 600; }
    .ds-btn.active-d { background: #1a2233; color: #5fa8e8; border-color: #185FA5; font-weight: 600; }

    .search-box { background: #1a1a1a; margin: 10px 12px 0; border-radius: 12px; border: 0.5px solid #2a2a2a; padding: 10px 12px; }
    .search-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; }
    .search-row:first-child { border-bottom: 0.5px solid #2a2a2a; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .dot-o { background: #378ADD; }
    .dot-d { background: #D4537E; }
    .search-row select { border: none; background: transparent; font-size: 15px; color: #e0e0e0; flex: 1; outline: none; cursor: pointer; }
    .search-row select.placeholder { color: #444; }

    .btn-search { width: calc(100% - 24px); margin: 8px 12px 0; background: #378ADD; color: #fff; border: none; border-radius: 8px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .btn-search:active { opacity: 0.85; }

    .section-label { font-size: 10px; font-weight: 600; color: #444; text-transform: uppercase; letter-spacing: 0.06em; padding: 12px 12px 4px; }
    .bus-card { background: #1a1a1a; margin: 0 12px 7px; border-radius: 12px; border: 0.5px solid #2a2a2a; padding: 11px 12px; }
    .bus-card.passed { opacity: 0.4; }
    .bus-card.passed.confirmed { opacity: 1; border: 1.5px solid #3B6D11; box-shadow: 0 0 0 4px #1a2e1a; }
    .bus-card.isnext { border: 1.5px solid #2a5f9e; }
    .btn-passed { width: 100%; margin-top: 9px; padding: 9px; border: 0.5px solid #97C459; border-radius: 8px; font-size: 12px; font-weight: 600; background: #EAF3DE; color: #3B6D11; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
    .btn-passed.done { background: #3B6D11; color: #fff; border-color: #3B6D11; cursor: default; }
    .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 24px; }
    .confirm-box { background: #1a1a1a; border-radius: 16px; padding: 20px; width: 100%; max-width: 320px; text-align: center; border: 0.5px solid #2a2a2a; }
    .confirm-box h3 { font-size: 16px; font-weight: 600; color: #f0f0f0; margin-bottom: 8px; }
    .confirm-box p { font-size: 13px; color: #888; margin-bottom: 18px; line-height: 1.5; }
    .confirm-btns { display: flex; gap: 8px; }
    .confirm-btns button { flex: 1; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 0.5px solid #2a2a2a; }
    .confirm-yes { background: #EAF3DE; color: #3B6D11; border-color: #97C459 !important; }
    .confirm-no { background: #252525; color: #888; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-time { font-size: 22px; font-weight: 600; color: #f0f0f0; }
    .card-sub { font-size: 12px; color: #555; margin-top: 2px; }
    .badges { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
    .badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
    .bg { background: #EAF3DE; color: #3B6D11; }
    .ba { background: #FAEEDA; color: #854F0B; }
    .br { background: #FCEBEB; color: #A32D2D; }
    .bx { background: #252525; color: #666; }

    .vote-section { display: flex; flex-direction: column; gap: 8px; margin-top: 9px; padding-top: 9px; border-top: 0.5px solid #2a2a2a; }
    .vote-label { font-size: 10px; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
    /* Selector amb pill lliscant */
    .pill-wrap { position: relative; display: flex; border-radius: 10px; background: #252525; border: 0.5px solid #2a2a2a; padding: 3px; gap: 0; overflow: hidden; }
    .pill-track { position: absolute; top: 3px; bottom: 3px; border-radius: 7px; transition: left 0.22s cubic-bezier(.4,0,.2,1), width 0.22s cubic-bezier(.4,0,.2,1), background 0.22s; z-index: 0; pointer-events: none; }
    .pill-opt { flex: 1; position: relative; z-index: 1; padding: 6px 4px; font-size: 11px; font-weight: 500; text-align: center; cursor: pointer; border-radius: 7px; color: #666; transition: color 0.2s; user-select: none; }
    .pill-opt.active { color: #fff; font-weight: 700; }
    /* Colors pill per ocupació */
    .pill-wrap.occ .pill-opt.active-buit { color: #3B6D11; }
    .pill-wrap.occ .pill-opt.active-mig  { color: #854F0B; }
    .pill-wrap.occ .pill-opt.active-ple  { color: #A32D2D; }
    /* Colors pill per puntualitat */
    .pill-wrap.time .pill-opt.active-punt { color: #3B6D11; }
    .pill-wrap.time .pill-opt.active-tard { color: #854F0B; }
    /* Colors del track */
    .pill-track.c-buit { background: #1a2e1a; border: 0.5px solid #3B6D11; }
    .pill-track.c-mig  { background: #2e2010; border: 0.5px solid #854F0B; }
    .pill-track.c-ple  { background: #2e1010; border: 0.5px solid #A32D2D; }
    .pill-track.c-punt { background: #1a2e1a; border: 0.5px solid #3B6D11; }
    .pill-track.c-tard { background: #2e2010; border: 0.5px solid #854F0B; }
    /* Mode clar */
    body.light .pill-wrap { background: #f0f0f0; border-color: #ddd; }
    body.light .pill-opt { color: #aaa; }
    body.light .pill-track.c-buit { background: #EAF3DE; border-color: #97C459; }
    body.light .pill-track.c-mig  { background: #FAEEDA; border-color: #EF9F27; }
    body.light .pill-track.c-ple  { background: #FCEBEB; border-color: #F09595; }
    body.light .pill-track.c-punt { background: #EAF3DE; border-color: #97C459; }
    body.light .pill-track.c-tard { background: #FAEEDA; border-color: #EF9F27; }
    body.light .pill-wrap.occ .pill-opt.active-buit { color: #3B6D11; }
    body.light .pill-wrap.occ .pill-opt.active-mig  { color: #854F0B; }
    body.light .pill-wrap.occ .pill-opt.active-ple  { color: #A32D2D; }
    body.light .pill-wrap.time .pill-opt.active-punt { color: #3B6D11; }
    body.light .pill-wrap.time .pill-opt.active-tard { color: #854F0B; }
    .vote-row { display: flex; gap: 3px; }
    .vm { flex: 1; padding: 5px 2px; border: 0.5px solid #2a2a2a; border-radius: 6px; font-size: 10px; text-align: center; cursor: pointer; background: #252525; color: #888; }
    .vm.ag { background: #EAF3DE; color: #3B6D11; border-color: #97C459; }
    .vm.aa { background: #FAEEDA; color: #854F0B; border-color: #EF9F27; }
    .vm.ar { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }

    .share-btn { width: 100%; margin-top: 7px; padding: 8px; border: 0.5px solid #2a2a2a; border-radius: 8px; font-size: 11px; background: #252525; color: #888; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .share-btn.on { background: #EAF3DE; color: #3B6D11; border-color: #97C459; }
    .share-confirm { font-size: 11px; color: #7bc857; margin-top: 5px; text-align: center; padding: 4px; background: #1a2e1a; border-radius: 6px; }

    .dot-pulse { width: 7px; height: 7px; border-radius: 50%; background: #639922; }
    .tag-next { display: inline-block; background: #E6F1FB; color: #185FA5; font-size: 10px; padding: 2px 7px; border-radius: 10px; margin-bottom: 5px; }
    .no-results { text-align: center; padding: 28px 16px; color: #555; font-size: 13px; }
    .votes-count { font-size: 11px; color: #999; margin-top: 4px; }
    .results-wrap { padding-bottom: 24px; margin-top: 10px; }

    .rating-wrap { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 9px; padding-top: 9px; border-top: 0.5px solid #2a2a2a; }
    .stars { display: flex; gap: 3px; }
    .star { width: 30px; height: 30px; border-radius: 50%; border: 0.5px solid #2a2a2a; background: #252525; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.12s; color: #555; }
    .star.active { background: #FAEEDA; border-color: #EF9F27; color: #854F0B; }
    .star:hover { background: #fff3e0; border-color: #EF9F27; color: #854F0B; }
    .rating-avg { font-size: 11px; color: #555; margin-left: 4px; }
    .rating-avg span { font-weight: 600; color: #e8a84f; }
    .ruta-error { background: #FCEBEB; border: 0.5px solid #F09595; border-radius: 10px; margin: 12px; padding: 12px 14px; font-size: 13px; color: #A32D2D; text-align: center; }
    .predict-wrap { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; padding-top: 8px; border-top: 0.5px solid #2a2a2a; }
    .predict-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; display: flex; align-items: center; gap: 4px; }
    .predict-badge.pb-tard { background: #FFF8E6; color: #854F0B; border: 0.5px solid #EF9F27; }
    .predict-badge.pb-ple  { background: #FCEBEB; color: #A32D2D; border: 0.5px solid #F09595; }
    .predict-badge.pb-mig  { background: #FAEEDA; color: #854F0B; border: 0.5px solid #EF9F27; }
    .predict-badge.pb-buit { background: #EAF3DE; color: #3B6D11; border: 0.5px solid #97C459; }
    .predict-label { font-size: 10px; color: #555; margin-top: 6px; width: 100%; }
    /* ── Pantalla d'inici ── */
    .welcome-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 24px; gap: 16px; position: relative; }
    .welcome-logo { font-size: 56px; margin-bottom: 4px; }
    .welcome-title { font-size: 36px; font-weight: 800; color: #f0f0f0; text-align: center; line-height: 1.2; letter-spacing: -0.5px; }
    .welcome-sub { font-size: 14px; color: #555; text-align: center; margin-bottom: 16px; }
    .welcome-btn { width: 100%; padding: 18px 20px; border-radius: 16px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 12px; text-align: left; transition: transform 0.1s; }
    .welcome-btn:active { transform: scale(0.98); }
    .welcome-btn-mb { background: #378ADD; }
    .welcome-btn-bm { background: #1a1a1a; border: 1.5px solid #2a2a2a; }
    .welcome-btn-icon { font-size: 28px; }
    .welcome-btn-text { flex: 1; }
    .welcome-btn-title { font-size: 16px; font-weight: 700; }
    .welcome-btn-mb .welcome-btn-title { color: #fff; }
    .welcome-btn-bm .welcome-btn-title { color: #f0f0f0; }
    .welcome-btn-desc { font-size: 12px; margin-top: 2px; }
    .welcome-btn-mb .welcome-btn-desc { color: #B5D4F4; }
    .welcome-btn-bm .welcome-btn-desc { color: #999; }
    .welcome-btn-arrow { font-size: 22px; }
    .welcome-btn-mb .welcome-btn-arrow { color: #B5D4F4; }
    .welcome-btn-bm .welcome-btn-arrow { color: #ccc; }
    .welcome-line { width: 100%; height: 1px; background: #2a2a2a; }
    /* Amagar l'app fins que s'esculli direcció */
    .app-content { display: none; }

    /* ── Animacions globals ── */
    * { transition: background-color 0.2s ease, border-color 0.2s ease, color 0.15s ease, opacity 0.2s ease; }
    .bus-card { transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.2s ease, background-color 0.2s ease !important; }
    .bus-card:active { transform: scale(0.985); }
    .welcome-btn { transition: transform 0.15s ease, background 0.2s ease !important; }
    .welcome-btn:active { transform: scale(0.97) !important; }
    .btn-search { transition: transform 0.1s ease, opacity 0.15s ease !important; }
    .btn-search:active { transform: scale(0.97); opacity: 0.9; }
    .vm { transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease !important; }
    .vm:active { transform: scale(0.93); }
    .ds-btn { transition: background 0.2s ease, color 0.2s ease !important; }

    /* Pantalla inici - entrada suau */
    .welcome-screen { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* App content - entrada suau */
    .app-content.visible { animation: slideIn 0.25s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(18px); } to { opacity: 1; transform: translateX(0); } }

    /* ── Bus anterior col·lapsable ── */
    .passed-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 2px 0; user-select: none; }
    .passed-header:active { opacity: 0.7; }
    .passed-chevron { font-size: 13px; color: #555; transition: transform 0.25s ease !important; }
    .passed-chevron.open { transform: rotate(180deg); }
    .passed-body { overflow: hidden; max-height: 0; transition: max-height 0.35s ease, opacity 0.3s ease !important; opacity: 0; }
    .passed-body.open { max-height: 600px; opacity: 1; }

    /* Results - cards entren suau */
    .results-wrap .bus-card { animation: cardIn 0.2s ease both; }
    @keyframes cardIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Toggle mode clar/fosc */
    .theme-toggle { background: none; border: 0.5px solid #2a2a2a; border-radius: 20px; padding: 5px 10px; cursor: pointer; font-size: 11px; color: #666; display: flex; align-items: center; gap: 5px; transition: all 0.2s; }
    .theme-toggle:hover { border-color: #444; color: #aaa; }

    /* Mode clar */
    body.light { background: #f5f5f5; }
    body.light .app { background: #f5f5f5; }
    body.light .header { background: #fff; border-color: #e0e0e0; }
    body.light .header h1 { color: #111; }
    body.light .header-sub { color: #888; }
    body.light .theme-toggle { border-color: #ddd; color: #666; }
    body.light .theme-toggle:hover { border-color: #aaa; color: #333; }
    body.light #day-banner { }
    body.light .day-banner.feiner { background: #EAF3DE; border-color: #97C459; }
    body.light .feiner .day-type { color: #3B6D11; }
    body.light .feiner .day-desc { color: #639922; }
    body.light .feiner .day-icon { background: #C0DD97; }
    body.light .ds-btn { background: #f0f0f0; border-color: #ddd; color: #888; }
    body.light .ds-btn.active-f { background: #EAF3DE; color: #3B6D11; border-color: #97C459; }
    body.light .search-box { background: #fff; border-color: #e0e0e0; }
    body.light .search-row:first-child { border-bottom-color: #eee; }
    body.light .search-row select { color: #111; }
    body.light .bus-card { background: #fff; border-color: #e0e0e0; }
    body.light .bus-card.isnext { border-color: #378ADD; }
    body.light .bus-card.passed.confirmed { border-color: #639922; box-shadow: 0 0 0 4px #EAF3DE; }
    body.light .card-time { color: #111; }
    body.light .card-sub { color: #888; }
    body.light .vote-section { border-top-color: #eee; }
    body.light .vote-label { color: #999; }
    body.light .vm { background: #f5f5f5; border-color: #ddd; color: #666; }
    body.light .share-btn { background: #f5f5f5; border-color: #ddd; color: #666; }
    body.light .share-confirm { background: #EAF3DE; color: #3B6D11; }
    body.light .section-label { color: #999; }
    body.light .no-results { color: #999; }
    body.light .star { background: #f5f5f5; border-color: #ddd; color: #aaa; }
    body.light .rating-wrap { border-top-color: #eee; }
    body.light .rating-avg { color: #999; }
    body.light .predict-wrap { border-top-color: #eee; }
    body.light .predict-label { color: #999; }
    body.light .bx { background: #f0f0f0; color: #888; }
    body.light .confirm-box { background: #fff; border-color: #e0e0e0; }
    body.light .confirm-box h3 { color: #111; }
    body.light .confirm-box p { color: #666; }
    body.light .confirm-btns button { border-color: #ddd; }
    body.light .confirm-no { background: #f5f5f5; color: #666; }
    body.light .welcome-title { color: #111; }
    body.light .welcome-sub { color: #999; }
    body.light .welcome-btn-bm { background: #fff; border-color: #e0e0e0; }
    body.light .welcome-btn-bm .welcome-btn-title { color: #111; }
    body.light .welcome-line { background: #e0e0e0; }
    body.light .welcome-screen { background: #f5f5f5; }
    body.light .app-footer { border-top-color: #e0e0e0; }
    body.light .app-footer p { color: #aaa; }
    body.light .app-footer a { color: #bbb; }
    body.light [style*="background:#1a1a1a;border:0.5px solid #2a2a2a"] { background: #fff !important; border-color: #e0e0e0 !important; }
  </style>
</head>
<body>
<div class="app">

  <!-- ═══ PANTALLA D'INICI ═══ -->
  <div class="welcome-screen" id="welcome-screen">
    <!-- Botó tema a dalt a la dreta -->
    <div style="position:absolute;top:20px;right:20px;">
      <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn-welcome">☀️ Clar</button>
    </div>

    <div class="welcome-logo">🚌</div>
    <div class="welcome-title">Bus Bages</div>
    <div class="welcome-sub">Monbus E22 · E23 · Temps real</div>

    <div class="welcome-line"></div>

    <button class="welcome-btn welcome-btn-mb" onclick="enterApp('mb')">
      <div class="welcome-btn-icon">🏙️</div>
      <div class="welcome-btn-text">
        <div class="welcome-btn-title">Manresa → Barcelona</div>
        <div class="welcome-btn-desc">Horaris d'anada</div>
      </div>
      <div class="welcome-btn-arrow">›</div>
    </button>

    <button class="welcome-btn welcome-btn-bm" onclick="enterApp('bm')">
      <div class="welcome-btn-icon">🏡</div>
      <div class="welcome-btn-text">
        <div class="welcome-btn-title">Barcelona → Manresa</div>
        <div class="welcome-btn-desc">Horaris de tornada</div>
      </div>
      <div class="welcome-btn-arrow" style="color:#ccc;">›</div>
    </button>
  </div>

  <!-- ═══ APP PRINCIPAL (amagada fins que s'esculli) ═══ -->
  <div class="app-content" id="app-content">
    <div class="header">
      <div style="display:flex;align-items:center;gap:10px;">
        <button onclick="backToWelcome()" style="background:none;border:none;cursor:pointer;font-size:24px;color:#888;padding:0;line-height:1;">‹</button>
        <div style="flex:1;">
          <h1 id="header-title">Bus Bages</h1>
          <div class="header-sub" id="header-sub">Monbus E22 · E23</div>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">☀️ Clar</button>
      </div>
    </div>

    <!-- Banner dia + selector integrats -->

const dow = new Date().getDay();
let currentDay = dow === 0 ? 'diumenge' : dow === 6 ? 'dissabte' : 'feiner';
let myVotes = {}, sharing = {};

function toMins(t) {
  if (!t) return -1;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function nowMins() {
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}

function setDay(d) {
  currentDay = d;
  const banner = document.getElementById('day-banner');
  const typeEl = document.getElementById('day-type-text');
  const descEl = document.getElementById('day-desc-text');
  banner.className = 'day-banner';
  ['btn-f','btn-s','btn-d'].forEach(id => { const el = document.getElementById(id); if(el) el.className = 'ds-btn'; });
  if (d === 'feiner') {
    banner.classList.add('feiner');
    typeEl.textContent = 'Dia feiner';
    descEl.textContent = 'Servei complet · dilluns a divendres (excepte agost)';
    document.getElementById('btn-f').classList.add('active-f');
  } else if (d === 'dissabte') {
    banner.classList.add('dissabte');
    typeEl.textContent = 'Dissabte i festiu';
    descEl.textContent = 'Servei reduït de cap de setmana i dies festius';

  } else {
    banner.classList.add('festiu');
    typeEl.textContent = 'Diumenge';
    descEl.textContent = 'Servei de diumenge (excepte festius)';
    document.getElementById('btn-d').classList.add('active-d');
  }
  doSearch();
}

function loadVotes() {
  // Vots ocupacio/puntualitat - nomes re-renderitza si hi ha canvis externs
  db.collection("votes").onSnapshot({ includeMetadataChanges: false }, snapshot => {
    let changed = false;
    snapshot.docChanges().forEach(change => {
      const v = change.doc.data();
      const key = v.tripId + '_' + v.type;
      if (v.date !== TODAY) return; // ignorem vots sense data o d'altres dies
      if (change.type === 'removed') { delete globalVotes[key]; changed = true; }
      else if (globalVotes[key] !== v.value) { globalVotes[key] = v.value; changed = true; }
    });
    if (changed) doSearch();
  });

  // Valoracions 1-5 - calcula mitja per bus
  db.collection("ratings").onSnapshot(snapshot => {
    const raw = {};
    snapshot.forEach(doc => {
      const d = doc.data();
      if (d.date !== TODAY) return; // ignorem ratings sense data o d'altres dies
      if (!raw[d.tripId]) raw[d.tripId] = { sum: 0, count: 0 };
      raw[d.tripId].sum += d.stars;
      raw[d.tripId].count += 1;
    });
    globalRatings = raw;
    doSearch();
  });

  // Ubicacions en temps real
  db.collection("locations").onSnapshot(snapshot => {
    snapshot.forEach(doc => {
      const d = doc.data();
      if (d.date !== TODAY) { delete userLocations[d.tripId]; return; }
      if (Date.now() - d.time < 2 * 60 * 60 * 1000) {
        userLocations[d.tripId] = { lat: d.lat, lng: d.lng, hora: d.hora };
      } else { delete userLocations[d.tripId]; }
    });
    doSearch();
  });

  // Confirmacions "Ja ha passat" en temps real
  db.collection("confirmed").onSnapshot(snapshot => {
    const raw = {};
    snapshot.forEach(doc => {
      const d = doc.data();
      if (d.date !== TODAY) return; // ignorem confirmacions sense data o d'altres dies
      if (!raw[d.tripId]) raw[d.tripId] = 0;
      raw[d.tripId] += 1;
    });
    globalConfirmed = raw;
    doSearch();
  });

  // Historial dels ultims 14 dies per fer prediccions
  // Llegim tots els vots menys els d'avui
  db.collection("votes").onSnapshot(snapshot => {
    const hist = {};
    snapshot.forEach(doc => {
      const v = doc.data();
      if (!v.date || v.date === TODAY) return; // avui no computa com a historial
      if (!hist[v.tripId]) hist[v.tripId] = { occ: {}, time: {}, days: new Set() };
      if (v.type === 'occ') {
        hist[v.tripId].occ[v.value] = (hist[v.tripId].occ[v.value] || 0) + 1;
        hist[v.tripId].days.add(v.date);
      }
      if (v.type === 'time') {
        hist[v.tripId].time[v.value] = (hist[v.tripId].time[v.value] || 0) + 1;
      }
    });
    // Convertir Sets a counts
    Object.keys(hist).forEach(id => {
      hist[id].days = hist[id].days.size;
    });
    globalHistory = hist;
    doSearch();
  });
}

// Clau de data d'avui: YYYYMMDD
function todayKey() {
  const d = new Date();
  return d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
}
const TODAY = todayKey();

// Ordre geografic de les parades Manresa -> Barcelona
const STOP_ORDER = [
  'manresa_est','manresa_val','manresa_hos','castellgali','st_vicenc_pi',
  'monistrol_alv','monistrol_gom','olesa_clos','olesa_cat',
  'bcn_uni','bcn_palau','bcn_mc','bcn_macia','bcn_munt','bcn_gran'
];

// Retorna el tipus de dia seguent (feiner->dissabte->diumenge->feiner...)
function nextDayType(dayType) {
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  const dow = tomorrow.getDay(); // 0=diu, 6=dis
  return dow === 0 ? 'diumenge' : dow === 6 ? 'dissabte' : 'feiner';
}

function getTripsForDay(dayType, orig, dest) {
  const pool = (typeof currentDir !== 'undefined' && currentDir === 'bm')
    ? BM_FEINER
    : (T[dayType] || []);
  return pool
    .filter(t => t.times[orig] && t.times[dest])
    .filter(t => {
      const o = toMins(t.times[orig]), d = toMins(t.times[dest]);
      if (o < 0 || d < 0) return false;
      if (o > 22*60 && d < 3*60) return true;
      return o < d;
    })
    .sort((a, b) => toMins(a.times[orig]) - toMins(b.times[orig]));
}

function doSearch() {
  const orig = document.getElementById('sel-orig').value;
  const dest = document.getElementById('sel-dest').value;

  if (orig === dest) {
    document.getElementById('results').innerHTML = '<div class="no-results">Selecciona parades diferents.</div>';
    return;
  }

  const origIdx = STOP_ORDER.indexOf(orig);
  const destIdx = STOP_ORDER.indexOf(dest);

  // Bloquejar ruta inversa - nomes tenim horaris Manresa->Barcelona
  if (origIdx > destIdx) {
    document.getElementById('results').innerHTML = `
      <div class="ruta-error">
        Aquesta app només té els horaris en direcció<br>
        <strong>Manresa → Barcelona</strong>.<br>
        Per anar de Barcelona a Manresa, consulta
        <a href="https://catalunya.monbus.es" target="_blank" style="color:#A32D2D;">catalunya.monbus.es</a>
      </div>`;
    return;
  }

  const tripsAvui = getTripsForDay(currentDay, orig, dest);
  const now = nowMins();

  let passed = null, nextList = [];
  for (const t of tripsAvui) {
    if (toMins(t.times[orig]) <= now) passed = t;
    else nextList.push(t);
  }

  // Si és de matinada (00:00-05:29) i no hi ha bus passat avui,
  // busquem el darrer bus d'ahir (sempre feiner) com a "bus anterior"
  if (!passed && now < 5 * 60 + 30) {
    const tripsAhir = getTripsForDay('feiner', orig, dest);
    if (tripsAhir.length > 0) {
      // El darrer bus d'ahir és el que tenia l'hora de sortida més tardana
      passed = tripsAhir[tripsAhir.length - 1];
    }
  }

  // Si queden menys de 4 busos avui, afegim els primers de dema
  const TOTAL_NEXT = 4;
  if (nextList.length < TOTAL_NEXT) {
    const tomorrowType = nextDayType(currentDay);
    const tripsDema = getTripsForDay(tomorrowType, orig, dest);
    const needed = TOTAL_NEXT - nextList.length;
    const demaBusos = tripsDema.slice(0, needed).map(t => ({ ...t, _dema: true, _demaTipus: tomorrowType }));
    nextList = [...nextList, ...demaBusos];
  }

  let html = '';
  if (passed) {
    html += '<p class="section-label">Bus anterior</p>';
    html += renderCard(passed, orig, dest, 'passed');
  }

  // Separar busos d'avui i de dema
  const avuiList = nextList.filter(t => !t._dema);
  const demaList = nextList.filter(t => t._dema);

  if (avuiList.length > 0) {
    html += '<p class="section-label">Proper bus</p>';
    html += renderCard(avuiList[0], orig, dest, 'next');
    if (avuiList.length > 1) {
      html += '<p class="section-label">Següents busos</p>';
      for (let i = 1; i < avuiList.length; i++)
        html += renderCard(avuiList[i], orig, dest, '');
    }
  }

  if (demaList.length > 0) {
    const tipusLabel = demaList[0]._demaTipus === 'dissabte' ? 'Dissabte'
      : demaList[0]._demaTipus === 'diumenge' ? 'Diumenge' : 'Demà';
    html += `<p class="section-label">${tipusLabel} — primers busos</p>`;
    for (const t of demaList)
      html += renderCard(t, orig, dest, '');
  }

  if (!passed && nextList.length === 0)
    html = '<div class="no-results">No hi ha busos per a aquesta ruta avui.</div>';

  document.getElementById('results').innerHTML = html;
  // Inicialitzar pills amb posició correcta
  requestAnimationFrame(() => initPills());
}

// Retorna els badges de predicció basats en l'historial dels últims dies
// Llindar: si el 60% o mes dels dies va tenir aquell valor -> predicció
function predictionHtml(tripId) {
  const h = globalHistory[tripId];
  if (!h || h.days < 2) return ''; // cal almenys 2 dies d'historial

  const badges = [];
  const days = h.days;

  // Predicció d'ocupació
  const occPle  = h.occ['ple']  || 0;
  const occMig  = h.occ['mig']  || 0;
  const occBuit = h.occ['buit'] || 0;
  const occTotal = occPle + occMig + occBuit;
  if (occTotal > 0) {
    if (occPle / occTotal >= 0.6)
      badges.push('<span class="predict-badge pb-ple">Probablement anirà ple</span>');
    else if (occMig / occTotal >= 0.6)
      badges.push('<span class="predict-badge pb-mig">Probablement anirà mig ple</span>');
    else if (occBuit / occTotal >= 0.6)
      badges.push('<span class="predict-badge pb-buit">Probablement anirà buit</span>');
  }

  // Predicció de puntualitat
  const timeTard = h.time['tard'] || 0;
  const timePunt = h.time['punt'] || 0;
  const timeTotal = timeTard + timePunt;
  if (timeTotal > 0) {
    if (timeTard / timeTotal >= 0.6)
      badges.push('<span class="predict-badge pb-tard">Probablement anirà tard</span>');
  }

  if (badges.length === 0) return '';

  return `<div class="predict-wrap">
    ${badges.join('')}
    <span class="predict-label">Basat en ${days} dia${days !== 1 ? 'es' : ''} anteriors</span>
  </div>`;
}

function mapHtml(tripId) {
  const loc = userLocations[tripId];
  if (!loc) return '';
  return `<div style="margin-top:10px;">
    <iframe width="100%" height="180" style="border-radius:10px;border:0;" loading="lazy"
      src="https://www.openstreetmap.org/export/embed.html?bbox=${loc.lng-0.01}%2C${loc.lat-0.01}%2C${loc.lng+0.01}%2C${loc.lat+0.01}&marker=${loc.lat}%2C${loc.lng}">
    </iframe>
    <div style="font-size:10px;color:#999;text-align:center;margin-top:3px;">Darrera ubicació reportada a les ${loc.hora}</div>
  </div>`;
}

function ratingHtml(tripId) {
  const r = globalRatings[tripId];
  return `<div class="rating-wrap">
    <div class="stars">
      ${[1,2,3,4,5].map(n => `<div class="star ${(myRatings[tripId]||0)>=n?'active':''}" onclick="rateTrip('${tripId}',${n})">${n}</div>`).join('')}
    </div>
    ${r && r.count > 0
      ? `<div class="rating-avg"><span>${(r.sum/r.count).toFixed(1)}</span>/5 (${r.count} ${r.count===1?'vot':'vots'})</div>`
      : '<div class="rating-avg">Sense valoracions</div>'}
  </div>`;
}

function renderCard(trip, orig, dest, type) {
  const dep = trip.times[orig];
  const arr = trip.times[dest];
  const isPassed = type === 'passed';
  const isNext = type === 'next';
  // Interactiu = només el bus anterior i el proper bus, NO els "Següents busos"
  const interactive = isPassed || isNext;

  const myO = globalVotes[trip.id + '_occ'];
  const myT = globalVotes[trip.id + '_time'];

  const confirmedCount = globalConfirmed[trip.id] || 0;
  const isConfirmed = confirmedCount > 0;
  const alreadyConfirmed = sessionStorage.getItem('confirmed_' + trip.id);

  // Badges només per a busos interactius (passat i proper)
  let occBadge = !interactive ? '' :
      myO === 'ple' ? `<span class="badge br">Ple</span>`
    : myO === 'mig' ? `<span class="badge ba">Mig ple</span>`
    : myO === 'buit' ? `<span class="badge bg">Buit</span>`
    : isPassed ? `<span class="badge bx">Sense vots</span>` : '';

  let timeBadge = !interactive ? '' :
      myT === 'tard' ? `<span class="badge ba">Retard</span>`
    : myT === 'punt' ? `<span class="badge bg">Puntual</span>` : '';

  const shareConfirm = sharing[trip.id]
    ? `<div class="share-confirm">Ubicació compartida a les ${new Date().getHours()}:${String(new Date().getMinutes()).padStart(2,'0')} · gràcies!</div>`
    : '';

  // ── BUS ANTERIOR (interactiu) ─────────────────────────────────────────
  const passedSection = isPassed ? `
    ${ratingHtml(trip.id)}
    <button class="share-btn ${sharing[trip.id]?'on':''}" onclick="ts('${trip.id}')" ${sharing[trip.id]?'disabled':''}>
      ${sharing[trip.id]?'Ubicació enviada':'📍 Estava en aquest bus · comparteix ubicació'}
    </button>
    ${mapHtml(trip.id)}
    <button
      class="btn-passed ${alreadyConfirmed ? 'done' : ''}"
      onclick="${alreadyConfirmed ? '' : "askConfirmPassed('" + trip.id + "')"}"
      ${alreadyConfirmed ? 'disabled' : ''}>
      ${alreadyConfirmed
        ? '✓ El bus de les ' + dep + ' ja ha passat · ' + confirmedCount + ' ho confirmen'
        : '🚌 Ja ha passat' + (confirmedCount > 0 ? ' · ' + confirmedCount + ' persones ho confirmen' : '')}
    </button>` : '';

  // ── PROPER BUS (interactiu) ───────────────────────────────────────────
  const nextSection = isNext ? `
    ${predictionHtml(trip.id)}
    <div class="vote-section">
      <div>
        <div class="vote-label">Ocupació</div>
        <div class="pill-wrap occ" id="pill-${trip.id}-occ" data-id="${trip.id}" data-type="occ">
          <div class="pill-track"></div>
          <div class="pill-opt ${myO==='buit'?'active active-buit':''}" data-val="buit" onclick="cv('${trip.id}','occ','buit')">Buit</div>
          <div class="pill-opt ${myO==='mig'?'active active-mig':''}" data-val="mig" onclick="cv('${trip.id}','occ','mig')">Mig</div>
          <div class="pill-opt ${myO==='ple'?'active active-ple':''}" data-val="ple" onclick="cv('${trip.id}','occ','ple')">Ple</div>
        </div>
      </div>
      <div>
        <div class="vote-label">Puntualitat</div>
        <div class="pill-wrap time" id="pill-${trip.id}-time" data-id="${trip.id}" data-type="time">
          <div class="pill-track"></div>
          <div class="pill-opt ${myT==='punt'?'active active-punt':''}" data-val="punt" onclick="cv('${trip.id}','time','punt')">Puntual</div>
          <div class="pill-opt ${myT==='tard'?'active active-tard':''}" data-val="tard" onclick="cv('${trip.id}','time','tard')">Tard</div>
        </div>
      </div>
    </div>
    <button class="share-btn ${sharing[trip.id]?'on':''}" onclick="ts('${trip.id}')" ${sharing[trip.id]?'disabled':''}>
      ${sharing[trip.id]?'Ubicació enviada':'Estic en aquest bus · comparteix ubicació'}
    </button>
    ${ratingHtml(trip.id)}
    ${mapHtml(trip.id)}
    ${shareConfirm}` : '';

  // ── BUSOS INFORMATIUS (no interactius, només hora i línia) ────────────
  const cardClass = isPassed
    ? 'bus-card passed' + (isConfirmed ? ' confirmed' : '')
    : isNext ? 'bus-card isnext' : 'bus-card';

  if (isPassed) {
    return `<div class="${cardClass}">
      <div class="passed-header" onclick="togglePassed('${trip.id}')">
        <div>
          <div class="card-time" style="font-size:18px;">${dep}
            <span style="font-size:11px;font-weight:400;color:#555;margin-left:6px;">Arr. ${arr} · ${trip.line}</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <div class="badges">${occBadge}${timeBadge}</div>
          <span class="passed-chevron" id="chev-${trip.id}">▼</span>
        </div>
      </div>
      <div class="passed-body" id="pbody-${trip.id}">
        <div style="padding-top:9px;border-top:0.5px solid #2a2a2a;margin-top:8px;">
          ${passedSection}
        </div>
      </div>
    </div>`;
  }

  return `<div class="${cardClass}">
    ${isNext ? '<div class="tag-next">Proper bus</div>' : ''}
    <div class="card-top">
      <div>
        <div class="card-time">${dep}</div>
        <div class="card-sub">Arr. ${arr} · ${trip.line}</div>
      </div>
      <div class="badges">${occBadge}${timeBadge}</div>
    </div>
    ${nextSection}
  </div>`;
}

function togglePassed(id) {
  const body = document.getElementById('pbody-' + id);
  const chev = document.getElementById('chev-' + id);
  if (!body) return;
  body.classList.toggle('open');
  if (chev) chev.classList.toggle('open');
}

function cv(id, type, val) {
  const docId = id + '_' + type;
  globalVotes[docId] = val;
  // Moure el pill immediatament sense esperar Firebase
  movePill(id, type, val);
  doSearch();
  db.collection("votes").doc(docId).set({ tripId: id, type: type, value: val, date: TODAY, time: Date.now() })
    .catch(() => { delete globalVotes[docId]; doSearch(); });
}

function movePill(id, type, val) {
  const wrap = document.getElementById('pill-' + id + '-' + type);
  if (!wrap) return;
  const track = wrap.querySelector('.pill-track');
  const opts = wrap.querySelectorAll('.pill-opt');
  // Treure actiu de tots
  opts.forEach(o => { o.className = o.className.replace(/active(-\w+)?/g, '').trim(); });
  // Trobar l'índex de l'opció seleccionada
  let idx = -1;
  opts.forEach((o, i) => { if (o.dataset.val === val) idx = i; });
  if (idx === -1) { track.style.width = '0'; return; }
  // Calcular posició
  const opt = opts[idx];
  track.style.left = opt.offsetLeft + 'px';
  track.style.width = opt.offsetWidth + 'px';
  // Color del track i text actiu
  const colorMap = { buit:'c-buit', mig:'c-mig', ple:'c-ple', punt:'c-punt', tard:'c-tard' };
  track.className = 'pill-track ' + (colorMap[val] || '');
  opt.classList.add('active', 'active-' + val);
}

function initPills() {
  // Inicialitza tots els pills amb els vots actuals
  document.querySelectorAll('.pill-wrap').forEach(wrap => {
    const id = wrap.dataset.id;
    const type = wrap.dataset.type;
    if (!id || !type) return;
    const val = globalVotes[id + '_' + type];
    if (val) movePill(id, type, val);
  });
}

function rateTrip(id, stars) {
  myRatings[id] = stars;
  doSearch();
  const docId = 'rating_' + id + '_' + sessionId;
  db.collection("ratings").doc(docId).set({ tripId: id, stars: stars, date: TODAY, time: Date.now() })
    .catch(() => {});
}

function askConfirmPassed(id) {
  // Mostrem el modal de doble verificació
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.id = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-box">
      <h3>Confirmes que ja ha passat?</h3>
      <p>Estàs segur que el bus ja ha passat per la teva parada? Això avisarà a tots els usuaris.</p>
      <div class="confirm-btns">
        <button class="confirm-no" onclick="closeConfirm()">Cancel·lar</button>
        <button class="confirm-yes" onclick="doConfirmPassed('${id}')">Sí, ja ha passat</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function closeConfirm() {
  const el = document.getElementById('confirm-overlay');
  if (el) el.remove();
}

function doConfirmPassed(id) {
  closeConfirm();
  if (sessionStorage.getItem('confirmed_' + id)) return;
  sessionStorage.setItem('confirmed_' + id, '1');
  if (!globalConfirmed[id]) globalConfirmed[id] = 0;
  globalConfirmed[id] += 1;
  doSearch();
  const docId = 'confirmed_' + id + '_' + sessionId;
  db.collection("confirmed").doc(docId).set({ tripId: id, date: TODAY, time: Date.now() })
    .catch(() => {});
}
function ts(id) {
  // Primer mostrem el modal de doble verificació
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.id = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-box">
      <h3>Compartir ubicació</h3>
      <p>Estàs segur que vols compartir la teva ubicació actual? Tots els usuaris la podran veure.</p>
      <div class="confirm-btns">
        <button class="confirm-no" onclick="closeConfirm()">Cancel·lar</button>
        <button class="confirm-yes" onclick="doShareLocation('${id}')">Sí, compartir</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function doShareLocation(id) {
  closeConfirm();
  if (!navigator.geolocation) { alert("Navegador sense geolocalitzacio."); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const hora = new Date().getHours() + ':' + String(new Date().getMinutes()).padStart(2,'0');
      sharing[id] = true;
      userLocations[id] = { lat, lng, hora };
      doSearch();
      db.collection("locations").doc(id).set({ tripId: id, lat, lng, hora, date: TODAY, time: Date.now() });
    },
    () => { alert("No s'ha pogut obtenir la ubicacio. Dona permisos de localitzacio."); }
  );
}

// Color gris mentre no s'ha seleccionat res

  if (!sel) return;

}

// Els selectors s'inicialitzen quan l'usuari entra a l'app

  const selOrig = document.getElementById('sel-orig');

  if (selOrig) selOrig.addEventListener('change', () => updateSelectColor(selOrig));
  if (selDest) selDest.addEventListener('change', () => updateSelectColor(selDest));
}

let currentDir = 'mb';

function toggleTheme() {
  const body = document.body;
  const isLight = body.classList.contains('light');
  if (isLight) {
    body.classList.remove('light');
    localStorage.setItem('theme', 'dark');
  } else {
    body.classList.add('light');
    localStorage.setItem('theme', 'light');
  }
  syncThemeBtns();
}

function syncThemeBtns() {
  const isLight = document.body.classList.contains('light');
  const label = isLight ? '🌙 Fosc' : '☀️ Clar';
  ['theme-btn', 'theme-btn-welcome'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = label;
  });
}

// Aplicar tema desat i sincronitzar botons
(function() {
  if (localStorage.getItem('theme') === 'light') {
    document.body.classList.add('light');
  }
  // Sincronitzem quan el DOM carrega
  document.addEventListener('DOMContentLoaded', syncThemeBtns);
})();

function enterApp(dir) {
  currentDir = dir;
  document.getElementById('welcome-screen').style.display = 'none';
  const appContent = document.getElementById('app-content');
  appContent.style.display = 'block';
  appContent.classList.add('visible');

  // Capçalera
  if (dir === 'mb') {
    document.getElementById('header-title').textContent = 'Manresa → Barcelona';
    document.getElementById('header-sub').textContent = 'Monbus E22 · E23';
    document.getElementById('sel-orig').innerHTML = OPTS_MB_ORIG;

    document.getElementById('header-title').textContent = 'Barcelona → Manresa';

function backToWelcome() {

}
