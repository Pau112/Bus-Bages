<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bus Bages</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif; background: #0d0d0d; display: flex; justify-content: center; padding: max(env(safe-area-inset-top, 20px), 44px) 0 20px; min-height: 100vh; transition: background 0.6s ease; }
    .app { width: 100%; max-width: 390px; background: #0d0d0d; min-height: 100vh; transition: background 0.6s ease; }

    /* ── HEADER ── */
    .header { background: #1a1a1a; padding: 14px 16px 10px; border: 0.5px solid #2a2a2a; border-radius: 14px; margin: 10px 12px 0; transition: background 0.4s; }
    .header h1 { font-size: 22px; font-weight: 700; color: #f0f0f0; transition: color 0.4s; }
    .header-sub { font-size: 14px; color: #666; margin-top: 3px; transition: color 0.4s; }

    /* ── BANNER DIA (simplificat) ── */
    .day-simple { margin: 10px 12px 0; padding: 10px 14px; border-radius: 10px; background: #1a2e1a; border: 0.5px solid #3B6D11; text-align: center; font-size: 12px; font-weight: 600; color: #fff; letter-spacing: 0.03em; transition: all 0.4s; }
    body.light .day-simple { background: #EAF3DE; border-color: #97C459; color: #111; }

    /* ── SEARCH BOX ── */
    .search-box { background: #1a1a1a; margin: 10px 12px 0; border-radius: 12px; border: 0.5px solid #2a2a2a; transition: background 0.4s; position: relative; z-index: 10; }
    .search-row { display: flex; align-items: center; gap: 10px; padding: 0; cursor: pointer; position: relative; }
    .search-row:first-child { border-bottom: 0.5px solid #2a2a2a; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-left: 14px; }
    .dot-o { background: #378ADD; }
    .dot-d { background: #D4537E; }
    /* Selector custom */
    .custom-select { position: relative; flex: 1; }
    .custom-select-trigger { padding: 14px 14px 14px 8px; font-size: 16px; font-weight: 500; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; transition: color 0.2s; }
    .custom-select-trigger.selected { color: #ffffff; font-weight: 600; }
    .custom-select-trigger svg { flex-shrink: 0; transition: transform 0.25s ease; opacity: 0.4; }
    .custom-select-trigger.open svg { transform: rotate(180deg); }
    /* Dropdown panel */
    .custom-dropdown { position: fixed; left: 12px; right: 12px; background: #1e1e1e; border: 0.5px solid #2a2a2a; border-radius: 12px; z-index: 999; overflow: hidden; max-height: 0; opacity: 0; transform: translateY(-8px); transition: max-height 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.22s ease, transform 0.25s ease; pointer-events: none; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    .custom-dropdown.open { max-height: 280px; opacity: 1; transform: translateY(0); pointer-events: all; }
    .custom-dropdown-inner { overflow-y: auto; max-height: 280px; }
    .custom-option { padding: 13px 16px; font-size: 15px; color: #e0e0e0; cursor: pointer; transition: background 0.15s, color 0.15s; border-bottom: 0.5px solid rgba(255,255,255,0.06); }
    .custom-option:last-child { border-bottom: none; }
    .custom-option:hover { background: rgba(55,138,221,0.1); color: #fff; }
    .custom-option.active { color: #378ADD; background: rgba(55,138,221,0.08); }
    /* Mode clar */
    body.light .search-box { background: #fff; border-color: #e0e0e0; }
    body.light .search-row:first-child { border-bottom-color: #eee; }
    body.light .custom-select-trigger { color: #111; }
    body.light .custom-select-trigger.selected { color: #000; font-weight: 600; }
    body.light .custom-dropdown { background: #fff; border-color: #e0e0e0; box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
    body.light .custom-option { color: #111; border-bottom-color: #f0f0f0; }
    body.light .custom-option:hover { background: rgba(55,138,221,0.08); color: #000; }
    body.light .custom-option.active { color: #378ADD; background: rgba(55,138,221,0.06); }
    /* Input ocult per compatibilitat (doSearch el llegeix) */
    .hidden-select { display: none; }

    /* ── BTN SEARCH ── */
    .btn-search { width: calc(100% - 24px); margin: 8px 12px 0; background: #378ADD; color: #fff; border: none; border-radius: 10px; padding: 15px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.1s, opacity 0.1s; }
    .btn-search:active { transform: scale(0.97); opacity: 0.9; }

    /* ── SECTION LABEL ── */
    .section-label { font-size: 13px; font-weight: 700; color: #e0e0e0; text-transform: uppercase; letter-spacing: 0.08em; padding: 12px 12px 4px; }
    body.light .section-label { color: #bbb; }

    /* ── BUS CARDS ── */
    .bus-card { background: #1a1a1a; margin: 0 12px 7px; border-radius: 14px; border: 0.5px solid #2a2a2a; padding: 12px 14px; transition: background 0.4s, border 0.3s; }
    .bus-card.passed { opacity: 0.5; }
    .bus-card.passed.confirmed { opacity: 1; border: 1.5px solid #3B6D11; box-shadow: 0 0 0 3px rgba(59,109,17,0.15); }
    .bus-card.isnext { border: 1.5px solid #2a5f9e; box-shadow: 0 0 0 3px rgba(42,95,158,0.1); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-time { font-size: 34px; font-weight: 800; color: #ffffff; letter-spacing: -1px; }
    .card-sub { font-size: 17px; color: #e0e0e0; margin-top: 4px; font-weight: 500; }

    /* ── TAGS ── */
    .tag-next { display: inline-block; background: rgba(55,138,221,0.15); color: #5fa8e8; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; margin-bottom: 8px; border: 0.5px solid rgba(55,138,221,0.3); letter-spacing: 0.02em; }
    .tag-passed { display: inline-block; background: rgba(180,180,180,0.08); color: #777; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; margin-bottom: 8px; border: 0.5px solid rgba(150,150,150,0.2); letter-spacing: 0.02em; }
    body.light .tag-passed { background: rgba(0,0,0,0.05); color: #aaa; }

    /* ── BADGES ── */
    .badges { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
    .badge { font-size: 13px; padding: 4px 11px; border-radius: 20px; font-weight: 600; }
    .bg { background: rgba(59,109,17,0.15); color: #7bc857; border: 0.5px solid rgba(59,109,17,0.3); }
    .ba { background: rgba(200,50,50,0.15); color: #e05555; border: 0.5px solid rgba(200,50,50,0.3); }
    .br { background: rgba(200,50,50,0.15); color: #e05555; border: 0.5px solid rgba(200,50,50,0.3); }
    .bx { background: #252525; color: #555; }
    .bo { background: rgba(217,119,6,0.15); color: #F59E0B; border: 0.5px solid rgba(217,119,6,0.35); }
    body.light .bo { background: #FEF3C7; color: #D97706; border-color: #F59E0B; }
    body.light .bg { background: #EAF3DE; color: #3B6D11; border-color: #97C459; }
    body.light .ba { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
    body.light .br { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
    body.light .bx { background: #f0f0f0; color: #aaa; }

    /* ── PILL SELECTOR (Ocupació / Puntualitat) ── */
    .vote-section { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid #2a2a2a; }
    .vote-label { font-size: 13px; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
    body.light .vote-label { color: #999; }
    .pill-wrap { position: relative; display: flex; border-radius: 10px; background: #252525; border: 0.5px solid #2a2a2a; padding: 3px; overflow: hidden; }
    .pill-track { position: absolute; top: 3px; bottom: 3px; border-radius: 7px; transition: left 0.3s cubic-bezier(0.34,1.56,0.64,1), width 0.3s cubic-bezier(0.34,1.56,0.64,1), background-color 0.25s ease, border-color 0.25s ease; z-index: 0; pointer-events: none; background: rgba(255,255,255,0.06); border: 0.5px solid transparent; }
    .pill-opt { flex: 1; position: relative; z-index: 1; padding: 9px 4px; font-size: 14px; font-weight: 500; text-align: center; cursor: pointer; border-radius: 7px; color: #e0e0e0; transition: color 0.2s; user-select: none; }
    .pill-opt.active { font-weight: 700; }
    .pill-track[data-color="buit"], .pill-track[data-color="punt"] { background: rgba(59,109,17,0.22); border-color: rgba(59,109,17,0.45); }
    .pill-track[data-color="mig"] { background: rgba(217,119,6,0.22); border-color: rgba(217,119,6,0.45); }
    .pill-track[data-color="ple"], .pill-track[data-color="tard"] { background: rgba(200,50,50,0.22); border-color: rgba(200,50,50,0.45); }
    .pill-opt.active-buit, .pill-opt.active-punt { color: #7bc857; }
    .pill-opt.active-mig { color: #F59E0B; }
    .pill-opt.active-tard { color: #e05555; }
    .pill-opt.active-ple  { color: #e05555; }
    body.light .pill-wrap { background: #f0f0f0; border-color: #e0e0e0; }
    body.light .pill-opt { color: #bbb; }
    body.light .pill-track[data-color="buit"], body.light .pill-track[data-color="punt"] { background: #EAF3DE; border-color: #97C459; }
    body.light .pill-track[data-color="mig"] { background: #FEF3C7; border-color: #F59E0B; }
    body.light .pill-track[data-color="ple"], body.light .pill-track[data-color="tard"] { background: #FCEBEB; border-color: #F09595; }
    body.light .pill-opt.active-buit, body.light .pill-opt.active-punt { color: #3B6D11; }
    body.light .pill-opt.active-mig { color: #D97706; }
    body.light .pill-opt.active-tard, body.light .pill-opt.active-ple { color: #A32D2D; }

    /* ── SHARE BTN ── */
    .share-btn { width: 100%; margin-top: 8px; padding: 11px; border: 0.5px solid #2a2a2a; border-radius: 10px; font-size: 15px; background: #1e1e1e; color: #e0e0e0; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; }
    .share-btn:active { transform: scale(0.98); }
    .share-btn.on { background: rgba(59,109,17,0.15); color: #7bc857; border-color: rgba(59,109,17,0.4); }
    body.light .share-btn { background: #f5f5f5; border-color: #ddd; color: #888; }
    body.light .share-btn.on { background: #EAF3DE; color: #3B6D11; border-color: #97C459; }
    .share-confirm { font-size: 11px; color: #7bc857; margin-top: 5px; text-align: center; padding: 5px; background: rgba(59,109,17,0.1); border-radius: 8px; }

    /* ── BTN PASSAT (canvi: ara és subtil, invita a prémer) ── */
    .btn-passed { width: 100%; margin-top: 9px; padding: 11px 14px; border: 1px dashed #555; border-radius: 10px; font-size: 15px; font-weight: 500; background: transparent; color: #e0e0e0; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; letter-spacing: 0.01em; }
    .btn-passed:hover { border-color: #666; color: #aaa; background: rgba(255,255,255,0.03); }
    .btn-passed:active { transform: scale(0.98); }
    .btn-passed.done { background: rgba(59,109,17,0.12); color: #7bc857; border: 1px solid rgba(59,109,17,0.3); cursor: default; }
    body.light .btn-passed { border-color: #ccc; color: #aaa; }
    body.light .btn-passed.done { background: #EAF3DE; color: #3B6D11; border-color: #97C459; }

    /* ── CONFIRM MODAL ── */
    .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 24px; backdrop-filter: blur(4px); }
    .confirm-box { background: #1a1a1a; border-radius: 18px; padding: 24px; width: 100%; max-width: 320px; text-align: center; border: 0.5px solid #2a2a2a; }
    .confirm-box h3 { font-size: 17px; font-weight: 700; color: #f0f0f0; margin-bottom: 8px; }
    .confirm-box p { font-size: 13px; color: #666; margin-bottom: 20px; line-height: 1.6; }
    .confirm-btns { display: flex; gap: 8px; }
    .confirm-btns button { flex: 1; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: 0.5px solid #2a2a2a; transition: all 0.15s; }
    .confirm-btns button:active { transform: scale(0.97); }
    .confirm-yes { background: rgba(59,109,17,0.2); color: #7bc857; border-color: rgba(59,109,17,0.4) !important; }
    .confirm-no { background: #252525; color: #666; }
    body.light .confirm-box { background: #fff; border-color: #e0e0e0; }
    body.light .confirm-box h3 { color: #111; }
    body.light .confirm-box p { color: #888; }
    body.light .confirm-no { background: #f5f5f5; color: #888; }
    body.light .confirm-yes { background: #EAF3DE; color: #3B6D11; }

    /* ── RATING (nou disseny) ── */
    .rating-wrap { margin-top: 10px; padding-top: 10px; border-top: 0.5px solid #2a2a2a; }
    .rating-label { font-size: 13px; color: #e0e0e0; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; margin-bottom: 8px; }
    body.light .rating-label { color: #999; }
    .stars { display: flex; gap: 5px; align-items: center; }
    .star { flex: 1; height: 36px; border-radius: 8px; border: 0.5px solid #2a2a2a; background: #252525; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: all 0.15s cubic-bezier(.4,0,.2,1); }
    .star:active { transform: scale(0.9); }
    .star.active { background: rgba(239,159,39,0.15); border-color: rgba(239,159,39,0.4); }
    .star.active::after { content: ""; }
    .rating-avg-wrap { display: flex; align-items: center; justify-content: space-between; margin-top: 7px; }
    .rating-avg { font-size: 14px; color: #e0e0e0; }
    .rating-avg span { font-weight: 700; color: #e8a84f; font-size: 13px; }
    body.light .star { background: #f5f5f5; border-color: #e0e0e0; }
    body.light .star.active { background: #FFF8E6; border-color: #EF9F27; }
    body.light .rating-avg { color: #999; }

    /* ── PREDICT BADGES ── */
    .predict-wrap { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; padding-top: 8px; border-top: 0.5px solid #2a2a2a; }
    .predict-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; display: flex; align-items: center; gap: 4px; font-weight: 500; }
    .predict-badge.pb-tard { background: rgba(200,50,50,0.12); color: #e05555; border: 0.5px solid rgba(200,50,50,0.25); }
    .predict-badge.pb-ple  { background: rgba(200,50,50,0.12); color: #e05555; border: 0.5px solid rgba(200,50,50,0.25); }
    .predict-badge.pb-mig  { background: rgba(217,119,6,0.12); color: #F59E0B; border: 0.5px solid rgba(217,119,6,0.3); }
    .predict-badge.pb-buit { background: rgba(59,109,17,0.12); color: #7bc857; border: 0.5px solid rgba(59,109,17,0.25); }
    .predict-label { font-size: 13px; color: #e0e0e0; margin-top: 4px; width: 100%; }
    body.light .predict-label { color: #999; }

    /* ── NO RESULTS ── */
    .no-results { text-align: center; padding: 28px 16px; color: #444; font-size: 13px; }
    .results-wrap { padding-bottom: 24px; margin-top: 10px; }
    /* ── Campaneta notificacions ── */
    .bell-btn { background: none; border: none; cursor: pointer; font-size: 20px; padding: 4px 6px; border-radius: 8px; transition: transform 0.2s, background 0.2s; display: flex; align-items: center; justify-content: center; position: relative; }
    .bell-btn:active { transform: scale(0.88); }
    .bell-btn.active { animation: bellRing 0.5s ease; }
    .bell-btn .bell-dot { position: absolute; top: 2px; right: 2px; width: 8px; height: 8px; background: #378ADD; border-radius: 50%; border: 1.5px solid #0d0d0d; display: none; }
    .bell-btn.subscribed .bell-dot { display: block; }
    @keyframes bellRing {
      0%   { transform: rotate(0deg); }
      20%  { transform: rotate(-18deg); }
      40%  { transform: rotate(18deg); }
      60%  { transform: rotate(-12deg); }
      80%  { transform: rotate(8deg); }
      100% { transform: rotate(0deg); }
    }
    body.light .bell-btn .bell-dot { border-color: #f5f5f7; }
    @keyframes cardIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .bus-card { animation: cardIn 0.3s ease both; }
    .bus-card:nth-child(1) { animation-delay: 0ms; }
    .bus-card:nth-child(2) { animation-delay: 60ms; }
    .bus-card:nth-child(3) { animation-delay: 120ms; }
    .bus-card:nth-child(4) { animation-delay: 180ms; }
    .bus-card:nth-child(5) { animation-delay: 240ms; }
    .section-label { animation: cardIn 0.25s ease both; }
    .ruta-error { background: rgba(200,50,50,0.1); border: 0.5px solid rgba(200,50,50,0.3); border-radius: 10px; margin: 12px; padding: 12px 14px; font-size: 13px; color: #e05555; text-align: center; }

    /* ── PASSED CARD EXPAND ── */
    .passed-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .passed-chevron { font-size: 10px; color: #444; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
    .passed-chevron.open { transform: rotate(180deg); }
    .passed-body { height: 0; overflow: hidden; transition: height 0.38s cubic-bezier(0.4,0,0.2,1); }
    .passed-body.open { height: auto; }

    /* ── WELCOME SCREEN ── */
    .welcome-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 24px; gap: 14px; position: relative; transition: opacity 0.35s ease; }
    .welcome-logo { margin-bottom: 0; }
    @keyframes busFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .welcome-title { font-size: 36px; font-weight: 800; color: #f0f0f0; text-align: center; line-height: 1.1; letter-spacing: -1px; transition: color 0.4s; }
    .welcome-sub { font-size: 13px; color: #444; text-align: center; margin-bottom: 8px; transition: color 0.4s; }
    .welcome-line { width: 100%; height: 0.5px; background: #2a2a2a; transition: background 0.4s; }
    .welcome-btn { width: 100%; padding: 17px 20px; border-radius: 14px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 12px; text-align: left; transition: transform 0.15s ease, opacity 0.15s; }
    .welcome-btn:active { transform: scale(0.97); opacity: 0.9; }
    .welcome-btn-mb { background: #242424; border: 0.5px solid #333; }
    .welcome-btn-bm { background: #2a2a2a; border: 0.5px solid #333; }
    .welcome-btn-icon { font-size: 30px; }
    .welcome-btn-text { flex: 1; }
    .welcome-btn-title { font-size: 18px; font-weight: 700; }
    .welcome-btn-mb .welcome-btn-title { color: #e8e8e8; }
    .welcome-btn-bm .welcome-btn-title { color: #e0e0e0; }
    .welcome-btn-desc { font-size: 14px; margin-top: 3px; }
    .welcome-btn-mb .welcome-btn-desc { color: #666; }
    .welcome-btn-bm .welcome-btn-desc { color: #555; }
    .welcome-btn-arrow { display: none; }

    /* ── APP CONTENT AMAGAT ── */
    .app-content { display: none; opacity: 0; transition: opacity 0.3s ease; }
    .app-content.visible { opacity: 1; }

    /* ── THEME TOGGLE (sol/lluna) ── */
    .theme-toggle { background: none; border: none; cursor: pointer; font-size: 18px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s; position: relative; overflow: hidden; }
    .theme-toggle:hover { background: rgba(255,255,255,0.05); }
    .theme-icon { display: block; transition: transform 0.4s cubic-bezier(.4,0,.2,1), opacity 0.3s; }
    .theme-icon.hide { transform: translateY(30px); opacity: 0; }

    /* ── ANIMACIÓ TRANSICIONS ── */
    @keyframes slideDown { from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .welcome-screen { animation: fadeIn 0.4s ease; }

    /* ── MODE CLAR ── */
    body.light { background: #f5f5f7; }
    body.light .app { background: #f5f5f7; }
    body.light .header { background: #fff; border-color: #e0e0e0; }
    body.light .header h1 { color: #111; }
    body.light .header-sub { color: #888; }
    body.light .search-box { background: #fff; border-color: #e0e0e0; }
    body.light .search-row:first-child { border-bottom-color: #eee; }
    body.light .bus-card { background: #fff; border-color: #e0e0e0; }
    body.light .bus-card.isnext { border-color: #378ADD; }
    body.light .card-time { color: #000 !important; }
    body.light .card-sub { color: #333 !important; }
    body.light .vote-label { color: #333 !important; }
    body.light .pill-opt { color: #333 !important; }
    body.light .share-btn { color: #333 !important; background: #f5f5f5; }
    body.light .btn-passed { color: #333 !important; }
    body.light .rating-label { color: #333 !important; }
    body.light .rating-avg { color: #333 !important; }
    body.light .predict-label { color: #333 !important; }
    body.light .section-label { color: #555 !important; }

function toMins(t) {
  if (!t) return -1;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function nowMins() {
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}

function setDay(d) {
  currentDay = d;

  doSearch();
}

// ══ SISTEMA DE NOTIFICACIONS ══════════════════════════════════════════
// Cooldown per evitar spam: max 1 notificació per trip cada 5 minuts
const notifCooldown = {};

async function requestNotifPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  const perm = await Notification.requestPermission();
  return perm === 'granted';
}

function toggleBell(tripId, dep) {
  const key = 'bell_' + tripId;
  const isOn = localStorage.getItem(key) === '1';

  if (isOn) {
    // Desactivar
    localStorage.removeItem(key);
    updateBellUI(tripId, false);
    showToast('🔕 Notificacions desactivades per aquest bus');
  } else {
    // Activar - demanar permís
    requestNotifPermission().then(granted => {
      if (granted) {
        localStorage.setItem(key, '1');
        updateBellUI(tripId, true);
        showToast('\ud83d\udd14 T\'avisarem si hi ha canvis en el bus de les ' + dep);
      } else {
        showToast('⚠️ Has de permetre notificacions als ajustos del mòbil');
      }
    });
  }
}

function updateBellUI(tripId, active) {
  document.querySelectorAll('.bell-btn').forEach(btn => {
    if (btn.closest('[data-trip-check="' + tripId + '"]') ||
        btn.getAttribute('onclick')?.includes(tripId)) {
      btn.classList.toggle('subscribed', active);
      btn.classList.add('active');
      setTimeout(() => btn.classList.remove('active'), 600);
    }
  });
}

function sendNotif(title, body, tripId) {
  // Cooldown: no enviar si ja hem enviat una notif per aquest trip fa menys de 5 min
  const now = Date.now();
  if (notifCooldown[tripId] && now - notifCooldown[tripId] < 5 * 60 * 1000) return;
  if (!localStorage.getItem('bell_' + tripId)) return;
  if (Notification.permission !== 'granted') return;
  notifCooldown[tripId] = now;
  new Notification(title, {
    body: body,
    icon: 'icon.png',
    badge: 'icon.png',
    tag: tripId, // Evita notificacions duplicades (substitueix l'anterior)
  });
}

// Toast missatge temporal
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#e0e0e0;padding:10px 18px;border-radius:20px;font-size:13px;z-index:9999;border:0.5px solid #2a2a2a;box-shadow:0 4px 20px rgba(0,0,0,0.4);transition:opacity 0.3s;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

function isFromOtherUser(snapshot) {
  // Retorna true si el canvi ve d'un altre usuari (no de nosaltres)
  // fromCache=false i hasPendingWrites=false = dada confirmada del servidor d'altri
  return !snapshot.metadata.fromCache && !snapshot.metadata.hasPendingWrites;
}

function loadVotes() {
  // Vots: { includeMetadataChanges: true } per detectar si és local o extern
  let votesInitDone = false;
  db.collection("votes").onSnapshot({ includeMetadataChanges: false }, snapshot => {
    // includeMetadataChanges: false → només rebem canvis CONFIRMATS del servidor
    // Això elimina els snapshots locals i evita el parpadell
    const affectedTrips = new Set();
    snapshot.docChanges().forEach(change => {
      const v = change.doc.data();
      const key = v.tripId + '_' + v.type;
      if (v.date !== TODAY) return;
      if (change.type === 'removed') {
        delete globalVotes[key];
        affectedTrips.add(v.tripId);
      } else {
        // Sempre actualitzem — pot ser canvi propi confirmat o d'altre usuari
        globalVotes[key] = v.value;
        affectedTrips.add(v.tripId);
      }
    });
    affectedTrips.forEach(tripId => {
      updateBadges(tripId);
      const myO = globalVotes[tripId + '_occ'];
      const myT = globalVotes[tripId + '_time'];
      if (myO) movePill(tripId, 'occ', myO);
      if (myT) movePill(tripId, 'time', myT);
      // Notificació si el bus va tard o ple (només canvis nous, no l'estat inicial)
      if (votesInitDone) {
        if (myT === 'tard') sendNotif('🚌 Bus amb retard', 'El bus de les ' + tripId + ' va amb retard', tripId);
        if (myO === 'ple') sendNotif('🚌 Bus ple', 'El bus de les ' + tripId + ' va ple', tripId);
      }
    });
    if (!votesInitDone) setTimeout(() => { votesInitDone = true; }, 3000);
  });

  // Ratings: només re-renderitzar per canvis externs
  db.collection("ratings").onSnapshot({ includeMetadataChanges: true }, snapshot => {
    if (snapshot.metadata.hasPendingWrites) return; // canvi local, ignorar
    const raw = {};
    snapshot.forEach(doc => {
      const d = doc.data();
      if (d.date !== TODAY) return;
      if (!raw[d.tripId]) raw[d.tripId] = { sum: 0, count: 0 };
      raw[d.tripId].sum += d.stars;
      raw[d.tripId].count += 1;
      // Recuperar la nostra valoració si el doc és nostre
      if (doc.id === 'rating_' + d.tripId + '_' + sessionId) {
        myRatings[d.tripId] = d.stars;
      }
    });
    globalRatings = raw;
    // Actualitzar ratings al DOM sense re-renderitzar tot
    updateAllRatings();
  });

  // Ubicacions: sempre externes (la nostra ja l'actualitzem localment)
  let locInitDone = false;
  let locReady = false;
  setTimeout(() => { locReady = true; }, 4000);
  db.collection("locations").onSnapshot(snapshot => {
    let changed = false;
    snapshot.docChanges().forEach(change => {
      if (change.doc.metadata.hasPendingWrites) return; // nostra, ja actualitzada
      const d = change.doc.data();
      if (d.date !== TODAY) { delete userLocations[d.tripId]; changed = true; return; }
      if (Date.now() - d.time < 5 * 60 * 1000) {
        const isNew = !userLocations[d.tripId];
        userLocations[d.tripId] = { lat: d.lat, lng: d.lng, hora: d.hora, _time: d.time };
        changed = true;
        if (isNew && locReady) sendNotif('📍 Ubicació compartida', 'Algú ha compartit la seva ubicació en el bus de les ' + d.hora, d.tripId);
      } else { delete userLocations[d.tripId]; changed = true; }
    });
    if (changed) doSearch();
    locInitDone = true;
  });

  // Confirmacions: actualitzar comptador + notificació una sola vegada per trip
  const notifiedPassed = new Set();
  const existingConfirmedTrips = new Set();

  // Primer llegim l'estat actual amb .get() (una sola vegada, no és listener)
  db.collection("confirmed").where("date", "==", TODAY).get().then(snap => {
    snap.forEach(doc => existingConfirmedTrips.add(doc.data().tripId));

    // Ara sí iniciem el listener - els 'added' inicials ja els coneixem
    db.collection("confirmed").onSnapshot(snapshot => {
      const raw = {};
      snapshot.forEach(doc => {
        const d = doc.data();
        if (d.date !== TODAY) return;
        if (!raw[d.tripId]) raw[d.tripId] = 0;
        raw[d.tripId] += 1;
      });
      globalConfirmed = raw;
      updateAllConfirmed();

      snapshot.docChanges().forEach(change => {
        if (change.type !== 'added') return;
        const d = change.doc.data();
        if (d.date !== TODAY) return;
        if (existingConfirmedTrips.has(d.tripId)) return; // ja existia, ignorar
        if (notifiedPassed.has(d.tripId)) return;
        notifiedPassed.add(d.tripId);
        const btn = document.querySelector('.btn-passed[data-trip-id="' + d.tripId + '"]');
        const dep = btn ? btn.dataset.dep : '';
        sendNotif('🚌 Bus ja ha passat', 'El bus de les ' + dep + ' ja ha passat', d.tripId);
      });
    });
  });

  // Historial per prediccions: només en càrrega inicial
  db.collection("votes").onSnapshot(snapshot => {
    if (snapshot.metadata.fromCache) return; // esperar dades reals
    const hist = {};
    snapshot.forEach(doc => {
      const v = doc.data();
      if (!v.date || v.date === TODAY) return;
      if (!hist[v.tripId]) hist[v.tripId] = { occ: {}, time: {}, days: new Set() };
      if (v.type === 'occ') {
        hist[v.tripId].occ[v.value] = (hist[v.tripId].occ[v.value] || 0) + 1;
        hist[v.tripId].days.add(v.date);
      }
      if (v.type === 'time') {
        hist[v.tripId].time[v.value] = (hist[v.tripId].time[v.value] || 0) + 1;
      }
    });
    Object.keys(hist).forEach(id => { hist[id].days = hist[id].days.size; });
    const prevHistory = JSON.stringify(globalHistory);
    globalHistory = hist;
    if (JSON.stringify(hist) !== prevHistory) doSearch();
  });
}

// Actualitzar ratings al DOM sense re-renderitzar
function updateAllRatings() {
  document.querySelectorAll('[data-rating-id]').forEach(wrap => {
    const tripId = wrap.dataset.ratingId;
    const r = globalRatings[tripId];
    const avgWrap = wrap.querySelector('.rating-avg-wrap');
    if (!avgWrap) return;
    if (r && r.count > 0) {
      avgWrap.innerHTML = `<div class="rating-avg"><span>${(r.sum/r.count).toFixed(1)}</span> · ${r.count} ${r.count===1?'valoració':'valoracions'}</div>`;
    }
    // Restaurar les estrelles pròpies des de localStorage
    const myR = parseInt(localStorage.getItem('rated_' + TODAY + '_' + tripId) || '0', 10);
    if (myR > 0) {
      const alreadyRated = true;
      wrap.querySelectorAll('.star').forEach((s, i) => {
        s.textContent = i < myR ? '⭐' : '☆';
        s.classList.toggle('active', i < myR);
        s.style.cursor = 'default';
        s.onclick = null;
      });
    }
  });
}

// Actualitzar botons "ja ha passat" sense re-renderitzar
function updateAllConfirmed() {
  Object.keys(globalConfirmed).forEach(tripId => {
    const count = globalConfirmed[tripId];
    const btn = document.querySelector(`.btn-passed[data-trip-id="${tripId}"]`);
    if (!btn) return;
    const alreadyDone = btn.classList.contains('done');
    if (!alreadyDone) {
      btn.innerHTML = `👋 Confirma que ja ha passat${count > 0 ? ' · ' + count + ' ho confirmen' : ''}`;
    } else {
      const dep = btn.dataset.dep || '';
      btn.innerHTML = `✓ El bus de les ${dep} ja ha passat · ${count} ho confirmen`;
    }
  });
}

// Clau de data d'avui: YYYYMMDD
function todayKey() {
  const d = new Date();
  return d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
}
const TODAY = todayKey();

// Ordre geografic de les parades Manresa -> Barcelona
const STOP_ORDER = [
  'manresa_est','manresa_val','manresa_hos','castellgali','st_vicenc_pi',
  'monistrol_alv','monistrol_gom','olesa_clos','olesa_cat',
  'bcn_uni','bcn_palau','bcn_mc','bcn_macia','bcn_munt','bcn_gran'
];

// Retorna el tipus de dia seguent (feiner->dissabte->diumenge->feiner...)
function nextDayType(dayType) {
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  const dow = tomorrow.getDay(); // 0=diu, 6=dis
  return dow === 0 ? 'diumenge' : dow === 6 ? 'dissabte' : 'feiner';
}

function getTripsForDay(dayType, orig, dest) {
  const pool = (typeof currentDir !== 'undefined' && currentDir === 'bm')
    ? BM_FEINER
    : (T[dayType] || []);
  return pool
    .filter(t => t.times[orig] && t.times[dest])
    .filter(t => {
      const o = toMins(t.times[orig]), d = toMins(t.times[dest]);
      if (o < 0 || d < 0) return false;
      if (o > 22*60 && d < 3*60) return true;
      return o < d;
    })
    .sort((a, b) => toMins(a.times[orig]) - toMins(b.times[orig]));
}

function doSearch() {
  const orig = document.getElementById('sel-orig').value;
  const dest = document.getElementById('sel-dest').value;

  if (orig === dest) {
    document.getElementById('results').innerHTML = '<div class="no-results">Selecciona parades diferents.</div>';
    return;
  }

  const origIdx = STOP_ORDER.indexOf(orig);
  const destIdx = STOP_ORDER.indexOf(dest);

  // Bloquejar ruta inversa - nomes tenim horaris Manresa->Barcelona
  if (origIdx > destIdx) {
    document.getElementById('results').innerHTML = `
      <div class="ruta-error">
        Aquesta app només té els horaris en direcció<br>
        <strong>Manresa → Barcelona</strong>.<br>
        Per anar de Barcelona a Manresa, consulta
        <a href="https://catalunya.monbus.es" target="_blank" style="color:#A32D2D;">catalunya.monbus.es</a>
      </div>`;
    return;
  }

  const tripsAvui = getTripsForDay(currentDay, orig, dest);
  const now = nowMins();

  let passed = null, nextList = [];
  for (const t of tripsAvui) {
    if (toMins(t.times[orig]) <= now) passed = t;
    else nextList.push(t);
  }

  // Si és de matinada (00:00-05:29) i no hi ha bus passat avui,
  // busquem el darrer bus d'ahir (sempre feiner) com a "bus anterior"
  if (!passed && now < 5 * 60 + 30) {
    const tripsAhir = getTripsForDay('feiner', orig, dest);
    if (tripsAhir.length > 0) {
      // El darrer bus d'ahir és el que tenia l'hora de sortida més tardana
      passed = tripsAhir[tripsAhir.length - 1];
    }
  }

  // Si queden menys de 4 busos avui, afegim els primers de dema
  const TOTAL_NEXT = 4;
  if (nextList.length < TOTAL_NEXT) {
    const tomorrowType = nextDayType(currentDay);
    const tripsDema = getTripsForDay(tomorrowType, orig, dest);
    const needed = TOTAL_NEXT - nextList.length;
    const demaBusos = tripsDema.slice(0, needed).map(t => ({ ...t, _dema: true, _demaTipus: tomorrowType }));
    nextList = [...nextList, ...demaBusos];
  }

  let html = '';
  if (passed) {
    html += '<p class="section-label">Bus anterior</p>';
    html += renderCard(passed, orig, dest, 'passed');
  }

  // Separar busos d'avui i de dema
  const avuiList = nextList.filter(t => !t._dema);
  const demaList = nextList.filter(t => t._dema);

  if (avuiList.length > 0) {
    // El proper bus només és interactiu si falta menys de 30 minuts per sortir
    const nextDepMins = toMins(avuiList[0].times[orig]);
    const minsLeft = nextDepMins - now;
    const nextIsInteractive = minsLeft <= 30;

    html += '<p class="section-label">Proper bus</p>';
    html += renderCard(avuiList[0], orig, dest, nextIsInteractive ? 'next' : '');
    if (avuiList.length > 1) {
      html += '<p class="section-label">Següents busos</p>';
      for (let i = 1; i < avuiList.length; i++)
        html += renderCard(avuiList[i], orig, dest, '');
    }
  }

  if (demaList.length > 0) {
    const tipusLabel = demaList[0]._demaTipus === 'dissabte' ? 'Dissabte'
      : demaList[0]._demaTipus === 'diumenge' ? 'Diumenge' : 'Demà';
    html += `<p class="section-label">${tipusLabel} — primers busos</p>`;
    for (const t of demaList)
      html += renderCard(t, orig, dest, '');
  }

  if (!passed && nextList.length === 0)
    html = '<div class="no-results">No hi ha busos per a aquesta ruta avui.</div>';

  // Injectar resultats: si el passed card ja existeix i és el mateix, preservar estat
  const resultsEl = document.getElementById('results');
  const existingPassed = resultsEl.querySelector('.bus-card.passed');
  const newTemp = document.createElement('div');
  newTemp.innerHTML = html;
  const newPassed = newTemp.querySelector('.bus-card.passed');

  // Si el passed és el mateix trip, preservar l'estat obert/tancat
  if (existingPassed && newPassed) {
    const existingId = existingPassed.querySelector('[id^="pbody-"]');
    const newId = newPassed.querySelector('[id^="pbody-"]');
    if (existingId && newId && existingId.id === newId.id) {
      // Copiar l'estat del passed existent al nou
      if (existingId.classList.contains('open')) newId.classList.add('open');
      const existChev = existingPassed.querySelector('.passed-chevron');
      const newChev = newPassed.querySelector('.passed-chevron');
      if (existChev && newChev && existChev.classList.contains('open')) newChev.classList.add('open');
    }
  }

  resultsEl.innerHTML = newTemp.innerHTML;
  requestAnimationFrame(() => initPills());
}

// Retorna els badges de predicció basats en l'historial dels últims dies
// Llindar: si el 60% o mes dels dies va tenir aquell valor -> predicció
function predictionHtml(tripId) {
  const h = globalHistory[tripId];
  if (!h || h.days < 2) return ''; // cal almenys 2 dies d'historial

  const badges = [];
  const days = h.days;

  // Predicció d'ocupació
  const occPle  = h.occ['ple']  || 0;
  const occMig  = h.occ['mig']  || 0;
  const occBuit = h.occ['buit'] || 0;
  const occTotal = occPle + occMig + occBuit;
  if (occTotal > 0) {
    if (occPle / occTotal >= 0.6)
      badges.push('<span class="predict-badge pb-ple">Probablement anirà ple</span>');
    else if (occMig / occTotal >= 0.6)
      badges.push('<span class="predict-badge pb-mig">Probablement anirà mig ple</span>');
    else if (occBuit / occTotal >= 0.6)
      badges.push('<span class="predict-badge pb-buit">Probablement anirà buit</span>');
  }

  // Predicció de puntualitat
  const timeTard = h.time['tard'] || 0;
  const timePunt = h.time['punt'] || 0;
  const timeTotal = timeTard + timePunt;
  if (timeTotal > 0) {
    if (timeTard / timeTotal >= 0.6)
      badges.push('<span class="predict-badge pb-tard">Probablement anirà tard</span>');
  }

  if (badges.length === 0) return '';

  return `<div class="predict-wrap">
    ${badges.join('')}
    <span class="predict-label">Basat en ${days} dia${days !== 1 ? 'es' : ''} anteriors</span>
  </div>`;
}

function mapHtml(tripId) {
  const loc = userLocations[tripId];
  if (!loc) return `<div id="map-${tripId}"></div>`;
  return `<div id="map-${tripId}" style="margin-top:10px;">
    <iframe width="100%" height="180" style="border-radius:10px;border:0;" loading="lazy"
      src="https://www.openstreetmap.org/export/embed.html?bbox=${loc.lng-0.01}%2C${loc.lat-0.01}%2C${loc.lng+0.01}%2C${loc.lat+0.01}&marker=${loc.lat}%2C${loc.lng}">
    </iframe>
    <div style="font-size:10px;color:#555;text-align:center;margin-top:3px;">Ubicació reportada a les ${loc.hora}</div>
  </div>`;
}

function ratingHtml(tripId) {
  const r = globalRatings[tripId];
  // Recuperar valoració des de localStorage (persisteix entre sessions)
  const myR = myRatings[tripId] || parseInt(localStorage.getItem('rated_' + TODAY + '_' + tripId) || '0', 10);
  const alreadyRated = !!localStorage.getItem('rated_' + TODAY + '_' + tripId);
  const avg = r && r.count > 0 ? (r.sum/r.count) : 0;
  return `<div class="rating-wrap" data-rating-id="${tripId}">
    <div class="rating-label">Valoració del servei</div>
    <div class="stars">
      ${[1,2,3,4,5].map(n => `<div class="star ${myR>=n?'active':''}" onclick="${alreadyRated ? '' : 'rateTrip(\'' + tripId + '\',' + n + ')'}" style="${alreadyRated ? 'cursor:default;' : ''}">${myR>=n?'⭐':'☆'}</div>`).join('')}
    </div>
    <div class="rating-avg-wrap">
      ${r && r.count > 0
        ? `<div class="rating-avg"><span>${avg.toFixed(1)}</span> · ${r.count} ${r.count===1?'valoració':'valoracions'}</div>`
        : '<div class="rating-avg" style="width:100%;text-align:center;color:#444;">Sigues el primer en valorar</div>'}
    </div>
  </div>`;
}

function renderCard(trip, orig, dest, type) {
  const dep = trip.times[orig];
  const arr = trip.times[dest];
  const isPassed = type === 'passed';
  const isNext = type === 'next';
  // Interactiu = només el bus anterior i el proper bus, NO els "Següents busos"
  const interactive = isPassed || isNext;

  const myO = globalVotes[trip.id + '_occ'];
  const myT = globalVotes[trip.id + '_time'];

  const confirmedCount = globalConfirmed[trip.id] || 0;
  const isConfirmed = confirmedCount > 0;
  const alreadyConfirmed = localStorage.getItem('confirmed_' + TODAY + '_' + trip.id);

  // Badges només per a busos interactius (passat i proper)
  let occBadge = !interactive ? '' :
      myO === 'ple' ? `<span class="badge br">Ple</span>`
    : myO === 'mig' ? `<span class="badge bo">Mig ple</span>`
    : myO === 'buit' ? `<span class="badge bg">Buit</span>`
    : isPassed ? `<span class="badge bx">Sense vots</span>` : '';

  let timeBadge = !interactive ? '' :
      myT === 'tard' ? `<span class="badge ba">Retard</span>`
    : myT === 'punt' ? `<span class="badge bg">Puntual</span>` : '';

  const shareConfirm = sharing[trip.id]
    ? `<div class="share-confirm">Ubicació compartida a les ${new Date().getHours()}:${String(new Date().getMinutes()).padStart(2,'0')} · gràcies!</div>`
    : '';

  // ── BUS ANTERIOR (interactiu) ─────────────────────────────────────────
  const passedSection = isPassed ? `
    ${ratingHtml(trip.id)}
    <button class="share-btn ${sharing[trip.id]?'on':''}" onclick="ts('${trip.id}')" data-share-id="${trip.id}">
      📍 ${sharing[trip.id]?'Ubicació actualitzada':'Estava en aquest bus · comparteix ubicació'}
    </button>
    ${mapHtml(trip.id)}
    <button
      class="btn-passed ${alreadyConfirmed ? 'done' : ''}"
      data-trip-id="${trip.id}"
      data-dep="${dep}"
      onclick="${alreadyConfirmed ? '' : "askConfirmPassed('" + trip.id + "')"}"
      ${alreadyConfirmed ? 'disabled' : ''}>
      ${alreadyConfirmed
        ? '✓ El bus de les ' + dep + ' ja ha passat · ' + confirmedCount + ' ho confirmen'
        : '👋 Confirma que ja ha passat' + (confirmedCount > 0 ? ' · ' + confirmedCount + ' ho confirmen' : '')}
    </button>` : '';

  // ── PROPER BUS (interactiu) ───────────────────────────────────────────
  const nextSection = isNext ? `
    ${predictionHtml(trip.id)}
    <div class="vote-section">
      <div>
        <div class="vote-label">Ocupació</div>
        <div class="pill-wrap occ" id="pill-${trip.id}-occ" data-id="${trip.id}" data-type="occ">
          <div class="pill-track"></div>
          <div class="pill-opt ${myO==='buit'?'active active-buit':''}" data-val="buit" onclick="cv('${trip.id}','occ','buit')">Buit</div>
          <div class="pill-opt ${myO==='mig'?'active active-mig':''}" data-val="mig" onclick="cv('${trip.id}','occ','mig')">Mig</div>
          <div class="pill-opt ${myO==='ple'?'active active-ple':''}" data-val="ple" onclick="cv('${trip.id}','occ','ple')">Ple</div>
        </div>
      </div>
      <div>
        <div class="vote-label">Puntualitat</div>
        <div class="pill-wrap time" id="pill-${trip.id}-time" data-id="${trip.id}" data-type="time">
          <div class="pill-track"></div>
          <div class="pill-opt ${myT==='punt'?'active active-punt':''}" data-val="punt" onclick="cv('${trip.id}','time','punt')">Puntual</div>
          <div class="pill-opt ${myT==='tard'?'active active-tard':''}" data-val="tard" onclick="cv('${trip.id}','time','tard')">Tard</div>
        </div>
      </div>
    </div>
    <button class="share-btn ${sharing[trip.id]?'on':''}" onclick="ts('${trip.id}')" data-share-id="${trip.id}">
      📍 ${sharing[trip.id]?'Ubicació actualitzada':'Estic en aquest bus · comparteix ubicació'}
    </button>
    ${ratingHtml(trip.id)}
    ${mapHtml(trip.id)}
    ${shareConfirm}` : '';

  // ── BUSOS INFORMATIUS (no interactius, només hora i línia) ────────────
  const cardClass = isPassed
    ? 'bus-card passed' + (isConfirmed ? ' confirmed' : '')
    : isNext ? 'bus-card isnext' : 'bus-card';

  if (isPassed) {
    const isSubscribedP = localStorage.getItem('bell_' + trip.id) === '1';
    const bellBtnP = '<button class="bell-btn ' + (isSubscribedP?'subscribed':'') + '" onclick="toggleBell(\'' + trip.id + '\',\'' + dep + '\')" title="Activar notificacions">🔔<span class="bell-dot"></span></button>';
    return `<div class="${cardClass}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <div class="tag-passed">Bus anterior</div>
        ${bellBtnP}
      </div>
      <div class="passed-header" onclick="togglePassed('${trip.id}')">
        <div>
          <div class="card-time" style="font-size:34px;font-weight:800;">${dep}
            <span class="card-sub" style="display:inline;margin-left:8px;">Arr. ${arr} · ${trip.line}</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <div class="badges" data-badges-id="${trip.id}">${occBadge}${timeBadge}</div>
          <span class="passed-chevron" id="chev-${trip.id}">▼</span>
        </div>
      </div>
      <div class="passed-body" id="pbody-${trip.id}">
        <div style="padding-top:9px;border-top:0.5px solid #2a2a2a;margin-top:8px;">
          ${passedSection}
        </div>
      </div>
    </div>`;
  }

  const isSubscribed = localStorage.getItem('bell_' + trip.id) === '1';
  const bellBtn = '<button class="bell-btn ' + (isSubscribed?'subscribed':'') + '" onclick="toggleBell(\'' + trip.id + '\',\'' + dep + '\')" title="Activar notificacions">🔔<span class="bell-dot"></span></button>';


  const tagHtml = isNext ? '<div class="tag-next">Proper bus</div>' : isPassed ? '<div class="tag-passed">Bus anterior</div>' : '<div></div>';
  return `<div class="${cardClass}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
      ${tagHtml}
      ${bellBtn}
    </div>
    <div class="card-top">
      <div>
        <div class="card-time">${dep}</div>
        <div class="card-sub">Arr. ${arr} · ${trip.line}</div>
      </div>
      <div class="badges" data-badges-id="${trip.id}">${occBadge}${timeBadge}</div>
    </div>
    ${nextSection}
  </div>`;
}

function togglePassed(id) {
  const body = document.getElementById('pbody-' + id);
  const chev = document.getElementById('chev-' + id);
  if (!body) return;

  const isOpen = body.classList.contains('open');

  if (isOpen) {
    // Tancar: fixa l'alçada actual, després anima a 0
    body.style.height = body.scrollHeight + 'px';
    body.classList.remove('open');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        body.style.height = '0';
      });
    });
    body.addEventListener('transitionend', () => {
      body.style.height = '';
    }, { once: true });
  } else {
    // Obrir: anima de 0 a scrollHeight, després deixa auto
    body.style.height = '0';
    body.classList.add('open');
    const targetH = body.scrollHeight + 'px';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        body.style.height = targetH;
      });
    });
    body.addEventListener('transitionend', () => {
      body.style.height = 'auto';
    }, { once: true });
  }

  if (chev) chev.classList.toggle('open', !isOpen);
}

function cv(id, type, val) {
  const docId = id + '_' + type;
  globalVotes[docId] = val;
  movePill(id, type, val);
  updateBadges(id);
  db.collection("votes").doc(docId).set({ tripId: id, type: type, value: val, date: TODAY, time: Date.now() })
    .catch(() => { delete globalVotes[docId]; });
}

function updateBadges(tripId) {
  const myO = globalVotes[tripId + '_occ'];
  const myT = globalVotes[tripId + '_time'];
  document.querySelectorAll('[data-badges-id="' + tripId + '"]').forEach(el => {
    let h = '';
    if (myO === 'ple')  h += '<span class="badge br">Ple</span>';
    if (myO === 'mig')  h += '<span class="badge bo">Mig ple</span>';
    if (myO === 'buit') h += '<span class="badge bg">Buit</span>';
    if (myT === 'tard') h += '<span class="badge ba">Retard</span>';
    if (myT === 'punt') h += '<span class="badge bg">Puntual</span>';
    el.innerHTML = h;
  });
}

function movePill(id, type, val) {
  const wrap = document.getElementById('pill-' + id + '-' + type);
  if (!wrap) return;
  const track = wrap.querySelector('.pill-track');
  const opts = wrap.querySelectorAll('.pill-opt');
  opts.forEach(o => o.classList.remove('active','active-buit','active-mig','active-ple','active-punt','active-tard'));
  let targetOpt = null;
  opts.forEach(o => { if (o.dataset.val === val) targetOpt = o; });
  if (!targetOpt) return;
  // Canviar color via data-color (CSS attribute selector) → transició fluida
  track.dataset.color = val;
  track.style.left = targetOpt.offsetLeft + 'px';
  track.style.width = targetOpt.offsetWidth + 'px';
  targetOpt.classList.add('active', 'active-' + val);
}

function initPills() {
  document.querySelectorAll('.pill-wrap').forEach(wrap => {
    const id = wrap.dataset.id;
    const type = wrap.dataset.type;
    if (!id || !type) return;
    const val = globalVotes[id + '_' + type];
    if (!val) return;
    const track = wrap.querySelector('.pill-track');
    const opts = wrap.querySelectorAll('.pill-opt');
    track.style.transition = 'none';
    track.dataset.color = val;
    opts.forEach(o => o.classList.remove('active','active-buit','active-mig','active-ple','active-punt','active-tard'));
    let targetOpt = null;
    opts.forEach(o => { if (o.dataset.val === val) targetOpt = o; });
    if (targetOpt) {
      track.style.left = targetOpt.offsetLeft + 'px';
      track.style.width = targetOpt.offsetWidth + 'px';
      targetOpt.classList.add('active','active-' + val);
    }
    requestAnimationFrame(() => { track.style.transition = ''; });
  });
}

function rateTrip(id, stars) {
  // Si ja has valorat avui aquest bus, no fer res
  if (localStorage.getItem('rated_' + TODAY + '_' + id)) return;

  myRatings[id] = stars;
  // Guardar a localStorage perquè persisteixi en tornar a obrir la app
  localStorage.setItem('rated_' + TODAY + '_' + id, String(stars));

  // Actualitzar NOMÉS el rating sense re-renderitzar tot (evita que es plegui el passed)
  const wrap = document.querySelector('[data-rating-id="' + id + '"]');
  if (wrap) {
    wrap.querySelectorAll('.star').forEach((s, i) => {
      s.textContent = i < stars ? '⭐' : '☆';
      s.classList.toggle('active', i < stars);
    });
  }
  const docId = 'rating_' + id + '_' + sessionId;
  db.collection("ratings").doc(docId).set({ tripId: id, stars: stars, date: TODAY, time: Date.now() })
    .catch(() => {});
}

function askConfirmPassed(id) {
  // Mostrem el modal de doble verificació
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.id = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-box">
      <h3>Confirmes que ja ha passat?</h3>
      <p>Estàs segur que el bus ja ha passat per la teva parada? Això avisarà a tots els usuaris.</p>
      <div class="confirm-btns">
        <button class="confirm-no" onclick="closeConfirm()">Cancel·lar</button>
        <button class="confirm-yes" onclick="doConfirmPassed('${id}')">Sí, ja ha passat</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function closeConfirm() {
  const el = document.getElementById('confirm-overlay');
  if (el) el.remove();
}

function doConfirmPassed(id) {
  closeConfirm();
  if (localStorage.getItem('confirmed_' + TODAY + '_' + id)) return;
  localStorage.setItem('confirmed_' + TODAY + '_' + id, '1');
  if (!globalConfirmed[id]) globalConfirmed[id] = 0;
  globalConfirmed[id] += 1;
  // Actualitzar botó directament sense re-renderitzar
  const btn = document.querySelector(`.btn-passed[data-trip-id="${id}"]`);
  if (btn) {
    const dep = btn.dataset.dep || '';
    btn.classList.add('done');
    btn.disabled = true;
    btn.innerHTML = `✓ El bus de les ${dep} ja ha passat · ${globalConfirmed[id]} ho confirmen`;
    // Aura verda al card
    const card = btn.closest('.bus-card');
    if (card) card.classList.add('confirmed');
  }
  const docId = 'confirmed_' + id + '_' + sessionId;
  db.collection("confirmed").doc(docId).set({ tripId: id, date: TODAY, time: Date.now() })
    .catch(() => {});
}
function ts(id) {
  // Primer mostrem el modal de doble verificació
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.id = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-box">
      <h3>Compartir ubicació</h3>
      <p>Estàs segur que vols compartir la teva ubicació actual? Tots els usuaris la podran veure.</p>
      <div class="confirm-btns">
        <button class="confirm-no" onclick="closeConfirm()">Cancel·lar</button>
        <button class="confirm-yes" onclick="doShareLocation('${id}')">Sí, compartir</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function doShareLocation(id) {
  closeConfirm();
  if (!navigator.geolocation) { alert("Navegador sense geolocalitzacio."); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const hora = new Date().getHours() + ':' + String(new Date().getMinutes()).padStart(2,'0');
      sharing[id] = true;
      userLocations[id] = { lat, lng, hora, _time: Date.now() };
      // Actualitzar el botó
      const btn = document.querySelector('[data-share-id="' + id + '"]');
      if (btn) { btn.classList.add('on'); btn.innerHTML = '📍 Ubicació actualitzada'; }
      // Injectar mapa just sota el botó sense re-renderitzar el card
      const mapEl = document.getElementById('map-' + id);
      if (mapEl) {
        const bbox = (lng-0.01) + '%2C' + (lat-0.01) + '%2C' + (lng+0.01) + '%2C' + (lat+0.01);
        mapEl.style.marginTop = '10px';
        mapEl.innerHTML = '<iframe width="100%" height="180" style="border-radius:10px;border:0;" loading="lazy" src="https://www.openstreetmap.org/export/embed.html?bbox=' + bbox + '&marker=' + lat + '%2C' + lng + '"></iframe><div style="font-size:10px;color:#555;text-align:center;margin-top:3px;">Ubicació reportada a les ' + hora + '</div>';
      }
      db.collection("locations").doc(id).set({ tripId: id, lat, lng, hora, date: TODAY, time: Date.now() });
    },
    () => { alert("No s'ha pogut obtenir la ubicacio. Dona permisos de localitzacio."); }
  );
}

// Els selectors s'inicialitzen quan l'usuari entra a l'app

// ── DROPDOWN CUSTOM ──────────────────────────────────────────────────────
let dropdownData = { orig: [], dest: [] };
let dropdownOpen = null;

function buildDropdown(which, items) {
  dropdownData[which] = items;
  const inner = document.getElementById('cs-' + which + '-inner');
  if (!inner) return;
  // Usar addEventListener en lloc d'onclick per evitar problemes amb cometes
  inner.innerHTML = items.map(it =>
    `<div class="custom-option" data-val="${it.val}" data-which="${which}">${it.label}</div>`
  ).join('');
  inner.querySelectorAll('.custom-option').forEach(el => {
    el.addEventListener('click', () => {
      selectOption(el.dataset.which, el.dataset.val, el.textContent);
    });
  });
}

function toggleDropdown(which) {
  const dropdown = document.getElementById('cs-' + which + '-dropdown');
  const trigger = document.getElementById('cs-' + which + '-trigger');
  if (!dropdown) return;
  const isOpen = dropdown.classList.contains('open');
  closeAllDropdowns();
  if (!isOpen) {
    // Calcular posició vertical basat en el trigger
    const rect = trigger.getBoundingClientRect();
    dropdown.style.top = (rect.bottom + 6) + 'px';
    dropdown.classList.add('open');
    trigger.classList.add('open');
    dropdownOpen = which;
  }
}

function closeAllDropdowns() {
  ['orig','dest'].forEach(w => {
    const d = document.getElementById('cs-' + w + '-dropdown');
    const t = document.getElementById('cs-' + w + '-trigger');
    if (d) d.classList.remove('open');
    if (t) t.classList.remove('open');
  });
  dropdownOpen = null;
}

// Definició de parades en ordre per filtrat
const STOPS_MB = [
  'manresa_est','manresa_val','manresa_hos','castellgali','st_vicenc_pi',
  'monistrol_alv','monistrol_gom','olesa_clos','olesa_cat',
  'bcn_uni','bcn_palau','bcn_mc','bcn_macia','bcn_munt','bcn_gran'
];
const STOPS_BM = [
  'bcn_gran','bcn_corsega','bcn_mc','bcn_rei','bcn_edu',
  'olesa_oli','olesa_clos','monist_gom','monist_balm',
  'st_pi','cast_fa','man_hos','man_vall','man_est'
];

function selectOption(which, val, label) {
  const labelEl = document.getElementById('cs-' + which + '-label');
  const trigger = document.getElementById('cs-' + which + '-trigger');
  if (labelEl) labelEl.textContent = label;
  if (trigger) trigger.classList.add('selected');
  const inner = document.getElementById('cs-' + which + '-inner');
  if (inner) inner.querySelectorAll('.custom-option').forEach(o => {
    o.classList.toggle('active', o.dataset.val === val);
  });
  const sel = document.getElementById('sel-' + which);
  if (sel) {
    let found = false;
    for (let o of sel.options) { if (o.value === val) { found = true; break; } }
    if (!found) { const opt = document.createElement('option'); opt.value = val; opt.text = label; sel.add(opt); }
    sel.value = val;
  }
  closeAllDropdowns();

  // Si hem seleccionat origen, filtrar les opcions de destí
  if (which === 'orig') {
    filterDestByOrig(val);
  }
}

function filterDestByOrig(origVal) {
  const stops = currentDir === 'bm' ? STOPS_BM : STOPS_MB;
  const origIdx = stops.indexOf(origVal);
  if (origIdx === -1) return;
  // Destí = totes les parades DESPRÉS de l'origen
  const validDest = stops.slice(origIdx + 1);
  const inner = document.getElementById('cs-dest-inner');
  if (!inner) return;
  inner.querySelectorAll('.custom-option').forEach(opt => {
    const isValid = validDest.includes(opt.dataset.val);
    opt.style.display = isValid ? '' : 'none';
    opt.style.opacity = isValid ? '1' : '0.3';
    opt.style.pointerEvents = isValid ? '' : 'none';
  });
  // Reset destí si la selecció actual ja no és vàlida
  const selDest = document.getElementById('sel-dest');
  if (selDest && selDest.value && !validDest.includes(selDest.value)) {
    selDest.value = '';
    const destLabel = document.getElementById('cs-dest-label');
    const destTrigger = document.getElementById('cs-dest-trigger');
    if (destLabel) destLabel.textContent = 'Selecciona destinació';
    if (destTrigger) destTrigger.classList.remove('selected');
  }
}

// Tancar dropdown en clicar fora
document.addEventListener('click', e => {
  if (!e.target.closest('.custom-select') && dropdownOpen) closeAllDropdowns();
});

function buildDropdownFromOpts(which, optsHtml, placeholder) {
  // Parsejar les opcions de l'HTML string (OPTS_MB_ORIG etc.)
  const tmp = document.createElement('div');
  tmp.innerHTML = '<select>' + optsHtml + '</select>';
  const options = Array.from(tmp.querySelectorAll('option[value]'));
  const items = options.filter(o => o.value).map(o => ({ val: o.value, label: o.textContent }));
  buildDropdown(which, items);
  // Reset label
  const labelEl = document.getElementById('cs-' + which + '-label');
  const trigger = document.getElementById('cs-' + which + '-trigger');
  if (labelEl) labelEl.textContent = placeholder;
  if (trigger) trigger.classList.remove('selected');
  // Buidar select ocult i omplir-lo
  const sel = document.getElementById('sel-' + which);
  if (sel) { sel.innerHTML = optsHtml; sel.value = ''; }
  // Netejar actiu
  const inner = document.getElementById('cs-' + which + '-inner');
  if (inner) inner.querySelectorAll('.custom-option').forEach(o => o.classList.remove('active'));
}

function toggleTheme() {
  const body = document.body;
  const isLight = body.classList.contains('light');
  // Animació icona
  ['theme-icon','theme-icon-welcome'].forEach(id => {
    const el = document.getElementById(id);

    el.classList.add('hide');

function enterApp(dir) {
  currentDir = dir;
  const ws = document.getElementById('welcome-screen');
  const ac = document.getElementById('app-content');

  // Animació: welcome surt cap a l'esquerra, app entra des de la dreta
  ws.style.transition = 'opacity 0.28s ease, transform 0.28s ease';
  ws.style.opacity = '0';
  ws.style.transform = 'translateX(-30px)';

  setTimeout(() => {
    ws.style.display = 'none';
    ws.style.transition = '';
    ws.style.opacity = '';
    ws.style.transform = '';

    ac.style.opacity = '0';
    ac.style.transform = 'translateX(30px)';
    ac.style.transition = 'none';
    ac.style.display = 'block';

    requestAnimationFrame(() => {
      ac.style.transition = 'opacity 0.28s ease, transform 0.28s ease';
      requestAnimationFrame(() => {
        ac.style.opacity = '1';
        ac.style.transform = 'translateX(0)';
        ac.classList.add('visible');
      });
    });
  }, 260);

  // Capçalera
  if (dir === 'mb') {
    document.getElementById('header-title').textContent = 'Manresa → Barcelona';
    document.getElementById('header-sub').textContent = 'Monbus E22 · E23';
    buildDropdownFromOpts('orig', OPTS_MB_ORIG, "Selecciona parada d'origen");

  if (!window._appInited) {
    window._appInited = true;
    loadVotes();

  }
}
